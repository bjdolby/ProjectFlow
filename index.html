            ${(t.comments||[]).map(c=>{const u=S.users.find(x=>x.id===c.userId)||S.users[0];return`<div class="comment-item"><div class="avatar av-sm" style="background:${u.color}22;color:${u.color}">${u.initials}</div><div><div class="comment-meta"><span class="comment-author">${u.name}</span><span class="comment-time">${timeAgo(c.ts)}</span></div><div class="comment-text">${c.text}</div></div></div>`}).join('')}
          </div>
          <div class="comment-row" style="margin-top:10px">
            <div class="avatar av-sm" style="background:#7c6fff33;color:var(--accent);flex-shrink:0">${S.users[0]?.initials||'AJ'}</div>
            <textarea class="comment-input" id="ci-${t.id}" placeholder="Add a comment... (Ctrl+Enter to post)" rows="2" onmousedown="event.stopPropagation()"></textarea>
            <button class="btn btn-primary" style="padding:6px 12px;flex-shrink:0;align-self:flex-end" id="post-btn-${t.id}" data-tid="${t.id}">Post</button>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);padding-top:12px;border-top:1px solid var(--border)">
          <span>Created: ${new Date(t.created).toLocaleString('en-GB')}</span>
          <span>Updated: ${new Date(t.updated).toLocaleString('en-GB')}</span>
        </div>
      </div>
    </div>`;
    document.body.appendChild(overlay);
    // Wire post button and Ctrl+Enter
    const ciEl=document.getElementById('ci-'+t.id);
    const postBtn=document.getElementById('post-btn-'+t.id);
    if(ciEl){
      ciEl.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();this.addComment(t.id);}});
    }
    if(postBtn){postBtn.addEventListener('click',()=>this.addComment(t.id));}
    if(t._timerRunning)this.startTimerUI(t.id);
  },
  closeModal(){
    document.getElementById('modal-overlay')?.remove();
    document.getElementById('confirm-wrap')?.remove();
    openTaskId=null;
    if(timerInt){clearInterval(timerInt);timerInt=null}
    save();
    const c=document.getElementById('content');
    if(S.view==='kanban')this.renderKanban(c);
    else if(S.view==='projects')this.renderProjects(c);
    else if(S.view==='dashboard')this.renderDash(c);
    else if(S.view==='calendar')this.renderCal(c);
    else if(S.view==='gantt')this.renderGantt(c);
    this.renderSidebar();
  },

  /* ─── TASK UPDATES ─── */
  upd(id,field,value){const f=findTask(id);if(!f)return;f.t[field]=value;f.t.updated=Date.now();save()},
  updProg(id,val,slider){
    const f=findTask(id);if(!f)return;
    const {t,p}=f;t.progress=parseInt(val);t.updated=Date.now();
    if(parseInt(val)===100&&!t.completedAt)t.completedAt=Date.now();
    if(parseInt(val)<100)t.completedAt=null;
    const lbl=document.getElementById('ppct-'+id);if(lbl)lbl.textContent=val+'%';
    if(S.settings.autoProgress){
      const rules=p.automations||{0:'To Do',1:'In Progress',76:'On Hold',100:'Complete'};
      let tgt='';
      for(const [thresh,name] of Object.entries(rules).sort((a,b)=>+b[0]-+a[0])){if(parseInt(val)>=parseInt(thresh)){tgt=name;break}}
      if(tgt){const col=p.columns.find(c=>c.title===tgt);if(col&&col.id!==t.colId){t.colId=col.id;this.toast(`-> "${tgt}"`)}}
    }
    save();
  },
  toggleAssignee(id,userId,el){
    const f=findTask(id);if(!f)return;
    const {t}=f;if(!t.assignees)t.assignees=[];
    const i=t.assignees.indexOf(userId);
    if(i>=0)t.assignees.splice(i,1);else t.assignees.push(userId);
    const u=S.users.find(x=>x.id===userId);
    const sel=t.assignees.includes(userId);
    el.classList.toggle('selected',sel);
    el.style.color=sel?u.color:'';el.style.borderColor=sel?u.color:'';
    const chk=el.querySelector('i.ti-check');
    if(sel&&!chk){const ic=document.createElement('i');ic.className='ti ti-check';ic.style='font-size:12px;margin-left:2px';el.appendChild(ic)}
    else if(!sel&&chk)chk.remove();
    t.updated=Date.now();save();
  },
  addSub(id){
    const f=findTask(id);if(!f)return;
    const {t}=f;if(!t.subtasks)t.subtasks=[];
    t.subtasks.push({id:'s'+uid(),text:'New subtask',done:false});t.updated=Date.now();
    const list=document.getElementById('subs-'+id);
    if(list){
      const i=t.subtasks.length-1,s=t.subtasks[i];
      list.querySelectorAll('.empty-sub-msg').forEach(e=>e.remove());
      const div=document.createElement('div');div.className='check-item';
      div.innerHTML=`<div class="checkbox" onclick="App.toggleSub('${id}',${i})"></div><input class="check-text-input" value="${s.text}" onchange="App.updSub('${id}',${i},this.value)"/><button class="col-act-btn" onclick="App.delSub('${id}',${i})"><i class="ti ti-x" style="font-size:12px"></i></button>`;
      list.appendChild(div);div.querySelector('input').focus();div.querySelector('input').select();
    }
    save();
  },
  toggleSub(id,i){
    const f=findTask(id);if(!f)return;
    const {t,p}=f;t.subtasks[i].done=!t.subtasks[i].done;t.updated=Date.now();
    const list=document.getElementById('subs-'+id);
    if(list){const items=list.querySelectorAll('.check-item');const box=items[i]?.querySelector('.checkbox');const inp=items[i]?.querySelector('.check-text-input');if(box)box.classList.toggle('checked',t.subtasks[i].done);if(inp)inp.classList.toggle('done',t.subtasks[i].done)}
    const dn=t.subtasks.filter(s=>s.done).length,tot=t.subtasks.length;
    if(tot>0){const pct=Math.round(dn/tot*100);const sl=document.getElementById('pslider-'+id);if(sl){sl.value=pct;this.updProg(id,pct,sl)}}
    save();
  },
  updSub(id,i,v){const f=findTask(id);if(!f)return;f.t.subtasks[i].text=v;save()},
  delSub(id,i){const f=findTask(id);if(!f)return;f.t.subtasks.splice(i,1);this.showModal(f.t,f.p)},
  addLabel(id){const lbl=prompt('Add label:');if(!lbl)return;const f=findTask(id);if(!f)return;if(!f.t.labels)f.t.labels=[];f.t.labels.push(lbl.trim());f.t.updated=Date.now();save();
    const wrap=document.getElementById('labels-'+id);if(wrap){const idx=f.t.labels.length-1;const span=document.createElement('span');span.className='label '+labelCls(lbl);span.style.cssText='cursor:pointer;display:inline-flex;align-items:center;gap:3px;padding:3px 8px';span.innerHTML=lbl+'<i class="ti ti-x" style="font-size:10px;opacity:0.7" onclick="App.rmLabel(\''+id+'\','+idx+')"></i>';wrap.insertBefore(span,wrap.lastElementChild);}},
  rmLabel(id,i){const f=findTask(id);if(!f)return;f.t.labels.splice(i,1);f.t.updated=Date.now();save();this.showModal(f.t,f.p)},
  addTag(id){const tag=prompt('Add tag:');if(!tag)return;const f=findTask(id);if(!f)return;if(!f.t.tags)f.t.tags=[];f.t.tags.push(tag.toLowerCase().replace(/\s+/g,'-'));f.t.updated=Date.now();save();
    const wrap=document.getElementById('tags-'+id);if(wrap){const span=document.createElement('span');span.className='tag';span.innerHTML=`${f.t.tags.at(-1)}<i class="ti ti-x" onclick="App.rmTag('${id}',${f.t.tags.length-1})"></i>`;wrap.insertBefore(span,wrap.lastElementChild)}},
  rmTag(id,i){const f=findTask(id);if(!f)return;f.t.tags.splice(i,1);f.t.updated=Date.now();save();this.showModal(f.t,f.p)},
  addComment(id){
    const inp=document.getElementById('ci-'+id);
    if(!inp||!inp.value.trim())return;
    const f=findTask(id);if(!f)return;
    const cu=S.users[0];
    const c={id:'cm'+uid(),userId:cu.id,text:inp.value.trim(),ts:Date.now()};
    if(!f.t.comments)f.t.comments=[];f.t.comments.push(c);f.t.updated=Date.now();inp.value='';
    const container=document.getElementById('cmts-'+id);
    if(container){const div=document.createElement('div');div.className='comment-item';div.innerHTML=`<div class="avatar av-sm" style="background:${cu.color}22;color:${cu.color}">${cu.initials}</div><div><div class="comment-meta"><span class="comment-author">${cu.name}</span><span class="comment-time">just now</span></div><div class="comment-text">${c.text}</div></div>`;container.appendChild(div);}
    save();this.toast('Comment posted','ok');
  },
  dupTask(id){
    const f=findTask(id);if(!f)return;
    const copy=JSON.parse(JSON.stringify(f.t));copy.id='t'+uid();copy.title+=' (copy)';copy.created=copy.updated=Date.now();delete copy._timerRunning;delete copy._timerStart;
    f.p.tasks.push(copy);this.closeModal();if(S.view==='kanban')this.renderKanban(document.getElementById('content'));this.toast('Task duplicated','ok');
  },
  delTask(id){this.confirm('Delete Task','Are you sure? This cannot be undone.',()=>{for(const p of S.projects){const i=p.tasks.findIndex(t=>t.id===id);if(i>=0){p.tasks.splice(i,1);break}}this.closeModal();if(S.view==='kanban')this.renderKanban(document.getElementById('content'));this.toast('Task deleted');},'Delete','danger')},

  /* ─── TIMER ─── */
  toggleTimer(id){
    const f=findTask(id);if(!f)return;const {t}=f;
    if(t._timerRunning){
      t._timerRunning=false;
      const stopTime=Date.now();
      const elapsed=(stopTime-t._timerStart)/36e5;
      t.tracked=(t.tracked||0)+elapsed;
      t._timerStart=null;t.lastTracked=stopTime;
      // Log this session
      if(!t.timeLogs)t.timeLogs=[];
      t.timeLogs.push({id:'tl'+uid(),userId:S.users[0]?.id||'u1',start:stopTime-elapsed*36e5,end:stopTime,duration:elapsed,date:new Date().toISOString().slice(0,10),note:''});
      if(timerInt){clearInterval(timerInt);timerInt=null}
      const btn=document.getElementById('tbtn-'+id);if(btn){btn.classList.remove('running');btn.innerHTML='<i class="ti ti-player-play" style="font-size:12px"></i>Start'}
      this.updateTimerIndicator(null);this.toast('Timer stopped');
    }else{
      t._timerRunning=true;t._timerStart=Date.now();
      const btn=document.getElementById('tbtn-'+id);if(btn){btn.classList.add('running');btn.innerHTML='<i class="ti ti-player-pause" style="font-size:12px"></i>Pause'}
      this.startTimerUI(id);this.updateTimerIndicator(id);this.toast('Timer started','ok');
    }
    save();
  },
  startTimerUI(id){
    if(timerInt)clearInterval(timerInt);
    timerInt=setInterval(()=>{
      const f=findTask(id);if(!f||!f.t._timerRunning){clearInterval(timerInt);this.updateTimerIndicator(null);return}
      const elapsed=(Date.now()-f.t._timerStart)/36e5;
      const disp=document.getElementById('td-'+id);
      if(disp)disp.textContent=fmtTime((f.t.tracked||0)+elapsed);
      // Update topbar indicator display
      const ind=document.getElementById('timer-ind-display');
      if(ind)ind.textContent=fmtTime((f.t.tracked||0)+elapsed);
    },1000);
  },
  updateTimerIndicator(taskId){
    const ind=document.getElementById('timer-indicator');
    const indTask=document.getElementById('timer-ind-task');
    if(!ind)return;
    if(!taskId){ind.classList.remove('active');return;}
    const f=findTask(taskId);
    ind.classList.add('active');
    if(indTask&&f)indTask.textContent=f.t.title.slice(0,25);
  },
  openRunningTimer(){
    // Find the currently running timer and open that task
    for(const p of S.projects){
      const t=p.tasks.find(x=>x._timerRunning);
      if(t){this.nav('kanban',p.id);setTimeout(()=>this.openTask(t.id),120);return;}
    }
  },

  /* ─── CALENDAR ─── */
  renderCal(el){
    let all=S.projects.flatMap(p=>p.tasks.map(t=>({...t,proj:p})));
    // Apply person filter
    if(calPersonFilter)all=all.filter(t=>(t.assignees||[]).includes(calPersonFilter));
    const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const first=new Date(calYear,calMonth,1).getDay(),dim=new Date(calYear,calMonth+1,0).getDate(),now=new Date();
    let cells='';
    for(let d=0;d<first;d++){const prev=new Date(calYear,calMonth,d-first+1);cells+=`<div class="cal-cell other-month"><div class="cal-day">${prev.getDate()}</div></div>`}
    for(let d=1;d<=dim;d++){
      const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday=d===now.getDate()&&calMonth===now.getMonth()&&calYear===now.getFullYear();
      const dt=all.filter(t=>t.due===ds);
      cells+=`<div class="cal-cell ${isToday?'today':''}" onclick="App.calDayClick('${ds}')" title="Add task on this date"><div class="cal-day">${d}<span class="cal-add-hint">+</span></div>
        ${dt.slice(0,3).map(t=>{const po=priObj(t.priority);const u=calPersonFilter?null:t.assignees&&t.assignees[0]?S.users.find(x=>x.id===t.assignees[0]):null;return`<div class="cal-event" style="background:${t.proj.color}22;color:${t.proj.color};border-left:3px solid ${t.proj.color}" onclick="App.openTask('${t.id}')" title="${t.title} - ${t.proj.name}">${u?`<span style="font-size:9px;font-weight:700;background:${u.color}22;color:${u.color};border-radius:3px;padding:0 3px;margin-right:3px">${u.initials}</span>`:''}<span>${t.title}</span></div>`}).join('')}
        ${dt.length>3?`<div style="font-size:10px;color:var(--text3)">+${dt.length-3} more</div>`:''}
      </div>`;
    }
    // Person filter options
    const personOpts=`<option value="">All People</option>`+S.users.map(u=>`<option value="${u.id}"${calPersonFilter===u.id?' selected':''}>${u.name}</option>`).join('');
    el.style.display='flex';el.style.flexDirection='column';el.style.overflow='hidden';
    el.innerHTML=`<div class="cal-wrap">
      <div class="cal-nav">
        <button class="icon-btn" onclick="App.calNav(-1)"><i class="ti ti-chevron-left"></i></button>
        <div class="cal-month">${MONTHS[calMonth]} ${calYear}</div>
        <button class="icon-btn" onclick="App.calNav(1)"><i class="ti ti-chevron-right"></i></button>
        <button class="btn btn-ghost" style="margin-left:8px;font-size:12px" onclick="App.calToday()">Today</button>
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
          <select onchange="App.setCalPerson(this.value)" style="background:var(--bg3);border:1px solid ${calPersonFilter?'var(--accent)':'var(--border2)'};border-radius:9px;color:${calPersonFilter?'var(--accent)':'var(--text)'};font-family:var(--font);font-size:13px;padding:5px 10px;outline:none;cursor:pointer">${personOpts}</select>
          ${calPersonFilter?`<button class="btn btn-ghost" style="font-size:12px" onclick="App.setCalPerson('')"><i class="ti ti-x"></i></button>`:''}
        </div>
      </div>
      <div class="cal-grid">${DAYS.map(d=>`<div class="cal-head">${d}</div>`).join('')}${cells}</div>
    </div>`;
  },
  setCalPerson(uid){calPersonFilter=uid;this.renderCal(document.getElementById('content'))},
  calNav(d){calMonth+=d;if(calMonth<0){calMonth=11;calYear--}if(calMonth>11){calMonth=0;calYear++}this.renderCal(document.getElementById('content'))},
  calToday(){const n=new Date();calMonth=n.getMonth();calYear=n.getFullYear();this.renderCal(document.getElementById('content'))},

  /* ─── GANTT ─── */
  setGanttFilter(val){ganttFilter=val;this.renderGantt(document.getElementById('content'))},
  setGanttPerson(val){ganttPersonFilter=val;this.renderGantt(document.getElementById('content'))},
  setGanttProgress(val){ganttProgressFilter=val;this.renderGantt(document.getElementById('content'))},
  renderGantt(el){
    // Build task list -- apply project filter
    const sources=ganttFilter?S.projects.filter(p=>p.id===ganttFilter):S.projects;
    let all=sources.flatMap(p=>p.tasks.map(t=>({...t,proj:p}))).filter(t=>t.due);
    if(ganttPersonFilter)all=all.filter(t=>(t.assignees||[]).includes(ganttPersonFilter));
    if(ganttProgressFilter){
      const td=today();
      if(ganttProgressFilter==='notstarted')all=all.filter(t=>t.progress===0);
      else if(ganttProgressFilter==='inprog')all=all.filter(t=>t.progress>0&&t.progress<100);
      else if(ganttProgressFilter==='onhold')all=all.filter(t=>{const p2=S.projects.find(pp=>pp.tasks.some(x=>x.id===t.id));const col=p2?.columns.find(c=>c.id===t.colId);return col&&col.title.toLowerCase().includes('hold');});
      else if(ganttProgressFilter==='done')all=all.filter(t=>t.progress===100);
      else if(ganttProgressFilter==='overdue')all=all.filter(t=>t.due<td&&t.progress<100);
    }
    all.sort((a,b)=>a.due.localeCompare(b.due));

    // Extend range to cover all task dates + padding
    const now=new Date();
    const allDates=all.map(t=>new Date(t.due)).filter(d=>!isNaN(d));
    const minDate=allDates.length?new Date(Math.min(...allDates,now)):new Date(now);
    const maxDate=allDates.length?new Date(Math.max(...allDates,now)):new Date(now);
    const startD=new Date(minDate);startD.setDate(startD.getDate()-14);
    const endD=new Date(maxDate);endD.setDate(endD.getDate()+21);
    const total=Math.round((endD-startD)/864e5);
    const getX=ds=>{const diff=Math.round((new Date(ds)-startD)/864e5);return Math.max(0,Math.min(100,diff/total*100))};
    const todayX=getX(today());

    const GANTT_MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let weekMarks='',gridLines='';
    for(let i=0;i<total;i+=7){
      const d=new Date(startD);d.setDate(d.getDate()+i);
      const x=getX(d.toISOString().slice(0,10));
      const isMonthStart=d.getDate()<=7;
      weekMarks+=`<div style="position:absolute;left:${x}%;transform:translateX(-50%);text-align:center;white-space:nowrap">
        <div style="font-size:9px;font-weight:700;color:${isMonthStart?'var(--accent2)':'var(--text3)'};text-transform:uppercase;line-height:1.2">${GANTT_MONTHS[d.getMonth()]}</div>
        <div style="font-size:11px;font-weight:600;color:var(--text2);line-height:1.2">${d.getDate()}</div>
      </div>`;
      gridLines+=`<div style="position:absolute;left:${x}%;top:0;width:1px;height:100%;background:var(--border);opacity:0.5;pointer-events:none"></div>`;
    }

    el.style.display='flex';el.style.flexDirection='column';el.style.overflow='hidden';
    el.innerHTML=`<div class="gantt-wrap"><div style="min-width:800px">
      <div class="gantt-head"><div class="g-name-col">Task</div><div class="g-timeline" style="position:relative;height:30px">${weekMarks}</div></div>
      ${!all.length?`<div style="padding:40px;text-align:center;color:var(--text3);font-size:13px">No tasks with due dates${ganttFilter?' in this project':''}${ganttPersonFilter?' for this person':''}</div>`:''}
      ${all.map(t=>{
        const po=priObj(t.priority);
        const endX=getX(t.due);
        const startX=Math.max(0,getX(new Date(new Date(t.due)-Math.max(1,t.estimate||2)*36e5).toISOString().slice(0,10)));
        const w=Math.max(1.5,endX-startX);
        const ov=t.due<today()&&t.progress<100;
        return`<div class="g-row">
          <div class="g-task-name" onclick="App.openTask('${t.id}')" title="Open task" style="cursor:pointer">
            <span style="font-size:14px;flex-shrink:0">${t.proj.emoji}</span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${t.title}</span>
            ${(t.assignees||[]).slice(0,2).map(aid=>{const u=S.users.find(x=>x.id===aid);return u?`<div class="avatar av-sm" style="background:${u.color}22;color:${u.color};flex-shrink:0;width:18px;height:18px;font-size:9px">${u.initials}</div>`:''}).join('')}
            <i class="ti ti-arrow-right" style="font-size:11px;opacity:0;flex-shrink:0;transition:opacity 0.15s" class="g-open-icon"></i>
          </div>
          <div class="g-bars">
            ${gridLines}
            <div style="position:absolute;left:${todayX}%;top:0;width:2px;height:100%;background:var(--red);opacity:0.5;pointer-events:none"></div>
            <div class="g-bar" style="left:${startX}%;width:${w}%;background:${ov?'var(--red)':po.col};cursor:pointer"
              onclick="App.openTask('${t.id}')"
              title="Click to open: ${t.title}">${w>8?t.title.slice(0,20):''}</div>
          </div>
        </div>`;
      }).join('')}
    </div></div>`;

    // Show arrow on row hover
    el.querySelectorAll('.g-task-name').forEach(row=>{
      row.addEventListener('mouseenter',()=>{const ic=row.querySelector('.ti-arrow-right');if(ic)ic.style.opacity='0.5'});
      row.addEventListener('mouseleave',()=>{const ic=row.querySelector('.ti-arrow-right');if(ic)ic.style.opacity='0'});
    });
  },

    exportData(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='projectflow-backup.json';a.click();this.toast('Backup exported!','ok')},
  importData(){
    const inp=document.getElementById('import-file-input');
    if(inp){inp.value='';inp.click();}
  },
  handleImport(input){
    const file=input.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        // Validate it looks like a ProjectFlow backup
        if(!data.projects||!Array.isArray(data.projects))throw new Error('Invalid backup: missing projects');
        this.confirm('Import Backup',
          `<div style="margin-bottom:8px">Found <strong>${data.projects.length} project${data.projects.length!==1?'s':''}</strong> and <strong>${data.projects.flatMap(p=>p.tasks||[]).length} tasks</strong> in this backup.</div><div style="font-size:12px;color:var(--red)">This will replace all your current data. This cannot be undone.</div>`,
          ()=>{
            // Migrate any missing fields
            if(!data.users)data.users=JSON.parse(JSON.stringify(SEED.users));
            if(!data.notifications)data.notifications={dueSoon:true,overdue:true};
            if(!data.notes)data.notes=[];
            if(!data.quickLinks)data.quickLinks=[];
            if(!data.workspaceName)data.workspaceName='ProjectFlow';
            if(!data.userName)data.userName=data.users[0]?.name||'Alex Johnson';
            if(!data.userRole)data.userRole='Admin';
            if(!data.settings)data.settings={autoProgress:true};
            data.projects.forEach(p=>{if(p.projectNotes===undefined)p.projectNotes='';});
            S=data;USERS=S.users;
            save();this.nav('dashboard');
            this.toast('Backup restored -- '+S.projects.length+' projects loaded','ok');
          },'Import & Replace','danger');
      }catch(err){
        this.toast('Failed to read backup: '+err.message,'err');
      }
    };
    reader.readAsText(file);
  },
  resetData(){this.confirm('Reset Data','Restore all demo data? Your changes will be lost.',()=>{S=JSON.parse(JSON.stringify(SEED));USERS=S.users;localStorage.removeItem('pf2');this.nav('dashboard');this.toast('Data reset to demo','ok')},'Reset','danger')},

  /* ─── UI HELPERS ─── */
  toast(msg,type=''){
    let c=document.getElementById('toasts');
    if(!c){c=document.createElement('div');c.id='toasts';document.body.appendChild(c);}
    const d=document.createElement('div');
    d.className=`toast ${type}`;
    const icons={ok:'ti-check',err:'ti-alert-circle',info:'ti-bell','':'ti-bell'};
    d.innerHTML=`<i class="ti ${icons[type]||'ti-bell'}" style="color:${type==='ok'?'var(--green)':type==='err'?'var(--red)':'var(--accent)'}"></i><span>${msg}</span>`;
    c.prepend(d);
    setTimeout(()=>{d.style.opacity='0';d.style.transform='translateY(8px)';d.style.transition='all 0.3s';setTimeout(()=>d.remove(),300)},4000);
  },
  confirm(title,body,onOk,okLabel='Confirm',style=''){
    document.getElementById('confirm-wrap')?.remove();
    const wrap=document.createElement('div');wrap.id='confirm-wrap';
    wrap.innerHTML=`<div class="confirm-box"><h3>${title}</h3><div style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5">${body}</div><div class="confirm-actions"><button class="btn btn-ghost" onclick="this.closest('#confirm-wrap').remove()">Cancel</button><button class="btn ${style==='danger'?'btn-danger':'btn-primary'}" id="cfm-ok">${okLabel}</button></div></div>`;
    document.body.appendChild(wrap);
    document.getElementById('cfm-ok').onclick=()=>{onOk();wrap.remove();};
    // Allow Enter to confirm, Escape to cancel
    const cfmKeyHandler=e=>{
      if(e.key==='Enter'){e.preventDefault();document.removeEventListener('keydown',cfmKeyHandler);onOk();wrap.remove();}
      else if(e.key==='Escape'){document.removeEventListener('keydown',cfmKeyHandler);wrap.remove();}
    };
    document.addEventListener('keydown',cfmKeyHandler);
  },

  /* ─── NOTES ─── */
  renderNotes(el){
    el.style.display='flex';el.style.flexDirection='column';el.style.overflow='hidden';
    if(!S.notes)S.notes=[];
    // Sticky note background colours (paper tones)
    const BG=['#fef08a','#86efac','#93c5fd','#f9a8d4','#fdba74','#c4b5fd','#6ee7b7','#fca5a5'];
    const rot=(n)=>n.pinned?0:(((parseInt(n.id.replace(/\D/g,''),36)||0)%7)-3);
    el.innerHTML=`<div id="notes-canvas">
      ${!S.notes.length?`<div class="notes-empty"><i class="ti ti-notes"></i><p style="font-size:13px">No notes yet -- click New Note</p></div>`:''}
      ${S.notes.map((n,i)=>{
        const bg=BG[i%BG.length];
        const x=n.x??( 40+(i%4)*260 );
        const y=n.y??( 30+Math.floor(i/4)*220 );
        const r=rot(n);
        const szStyle=(n.w?`width:${n.w}px;`:'')+(n.h?`height:${n.h}px;`:'');
        return`<div class="note-sticky${n.pinned?' is-fixed':''}${n.isHeader?' is-header':''}" data-nid="${n.id}" tabindex="0"
          style="left:${x}px;top:${y}px;background:${bg};transform:rotate(${r}deg);${szStyle}"
          onmousedown="App.noteMouseDown(event,'${n.id}')"
          onkeydown="App.noteKeyDown(event,'${n.id}')"
          onmouseup="App.noteSaveSize(event,'${n.id}')">
          <div class="note-drag-handle" style="background:${bg}">
            <i class="ti ti-grip-horizontal note-drag-icon"></i>
            <div class="note-sticky-actions">
              <button class="note-act-btn" onclick="event.stopPropagation();App.toggleHeaderNote('${n.id}')" title="${n.isHeader?'Remove header style':'Make header note'}">
                <i class="ti ti-heading" style="font-size:13px;${n.isHeader?'font-weight:900;':''}"></i>
              </button>
              <button class="note-act-btn" onclick="event.stopPropagation();App.togglePinNote('${n.id}')" title="${n.pinned?'Unpin':'Pin in place'}">
                <i class="ti ${n.pinned?'ti-map-pin-filled':'ti-map-pin'}"></i>
              </button>
              <button class="note-act-btn" onclick="event.stopPropagation();App.deleteNote('${n.id}')" title="Delete">
                <i class="ti ti-trash"></i>
              </button>
            </div>
          </div>
          <div class="note-title-inp" contenteditable="true" spellcheck="false"
            onmousedown="event.stopPropagation()"
            onblur="App.saveNoteField('${n.id}','title',this.innerText.trim())">${n.title||'Untitled'}</div>
          <textarea class="note-body" spellcheck="false"
            onmousedown="event.stopPropagation()"
            onblur="App.saveNoteField('${n.id}','content',this.value)">${n.content||''}</textarea>
          <div class="note-footer">${n.pinned?'Pinned . ':n.isHeader?'Header . ':''} ${timeAgo(n.updated||Date.now())}</div>
        </div>`;
      }).join('')}
    </div>`;
    // Expand canvas to fit all notes
    this._notesResizeCanvas();
  },
  _notesResizeCanvas(){
    const canvas=document.getElementById('notes-canvas');if(!canvas)return;
    let maxX=600,maxY=400;
    canvas.querySelectorAll('.note-sticky').forEach(el=>{
      maxX=Math.max(maxX,el.offsetLeft+el.offsetWidth+40);
      maxY=Math.max(maxY,el.offsetTop+el.offsetHeight+40);
    });
    canvas.style.minWidth=maxX+'px';
    canvas.style.minHeight=maxY+'px';
  },
  noteKeyDown(e,id){
    // Only delete when focus is on the card itself, not inside a text field
    if(e.key==='Delete'||e.key==='Backspace'){
      const active=document.activeElement;
      if(active&&(active.classList.contains('note-title-inp')||active.classList.contains('note-body')))return;
      e.preventDefault();
      this.deleteNote(id);
    }
  },
  noteMouseDown(e,id){
    const n=S.notes.find(x=>x.id===id);if(!n||n.pinned)return;
    if(e.target.closest('.note-sticky-actions')||e.target.closest('.note-title-inp')||e.target.closest('.note-body'))return;
    e.preventDefault();
    const card=e.currentTarget;
    const canvas=document.getElementById('notes-canvas');
    const startX=e.clientX,startY=e.clientY;
    const origX=n.x??(card.offsetLeft),origY=n.y??(card.offsetTop);
    card.classList.add('dragging');
    card.style.zIndex=999;
    // bring to front in notes array
    const idx=S.notes.findIndex(x=>x.id===id);
    if(idx>0){S.notes.splice(idx,1);S.notes.push(n);}
    const onMove=ev=>{
      const dx=ev.clientX-startX,dy=ev.clientY-startY;
      const nx=Math.max(0,origX+dx),ny=Math.max(0,origY+dy);
      card.style.left=nx+'px';card.style.top=ny+'px';
    };
    const onUp=ev=>{
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      card.classList.remove('dragging');
      card.style.zIndex='';
      const dx=ev.clientX-startX,dy=ev.clientY-startY;
      n.x=Math.max(0,origX+dx);n.y=Math.max(0,origY+dy);
      n.updated=Date.now();save();
      this._notesResizeCanvas();
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  },
  addNote(){
    if(!S.notes)S.notes=[];
    const colors=['#fef08a','#86efac','#93c5fd','#f9a8d4','#fdba74','#c4b5fd','#6ee7b7','#fca5a5'];
    // place new note in a visible spot
    const canvas=document.getElementById('notes-canvas');
    const sx=(canvas?.scrollLeft||0)+30+S.notes.length%4*20;
    const sy=(canvas?.scrollTop||0)+30+S.notes.length%3*20;
    const n={id:'n'+uid(),title:'New Note',content:'',pinned:false,color:colors[S.notes.length%colors.length],x:sx,y:sy,updated:Date.now()};
    S.notes.push(n);save();this.renderNotes(document.getElementById('content'));
    setTimeout(()=>{const c=document.querySelector('[data-nid="'+n.id+'"] .note-title-inp');if(c){c.focus();document.execCommand('selectAll',false,null);}},50);
    this.toast('Note added','ok');
  },
  saveNoteField(id,field,value){
    if(!S.notes)return;const n=S.notes.find(x=>x.id===id);if(!n)return;
    n[field]=value;n.updated=Date.now();save();
    // refresh footer timestamp
    const card=document.querySelector('[data-nid="'+id+'"] .note-footer');
    if(card)card.textContent=(n.pinned?'📌 Fixed . ':'')+timeAgo(n.updated);
  },
  deleteNote(id){
    this.confirm('Delete Note','Delete this note?',()=>{
      S.notes=(S.notes||[]).filter(x=>x.id!==id);save();this.renderNotes(document.getElementById('content'));this.toast('Note deleted');
    },'Delete','danger');
  },
  noteSaveSize(e,id){
    // Only save if the resize handle was used (bottom-right corner)
    const card=e.currentTarget;
    const n=S.notes.find(x=>x.id===id);if(!n)return;
    const w=card.offsetWidth,h=card.offsetHeight;
    if(w!==n.w||h!==n.h){n.w=w;n.h=h;n.updated=Date.now();save();}
  },
  toggleHeaderNote(id){
    const n=S.notes.find(x=>x.id===id);if(!n)return;
    n.isHeader=!n.isHeader;
    // Headers are always pinned (flat, no rotation) and wider by default
    if(n.isHeader){n.pinned=true;if(!n.w)n.w=320;if(!n.h)n.h=140;}
    n.updated=Date.now();save();

  },
  togglePinNote(id){
    if(!S.notes)return;const n=S.notes.find(x=>x.id===id);if(!n)return;
    n.pinned=!n.pinned;n.updated=Date.now();save();
    // update card in place without full re-render
    const card=document.querySelector('[data-nid="'+id+'"]');
    if(card){
      const rot=(n)=>n.pinned?0:(((parseInt(n.id.replace(/\D/g,''),36)||0)%7)-3);
      card.style.transform=`rotate(${rot(n)}deg)`;
      card.classList.toggle('is-fixed',n.pinned);
      const pinBtn=card.querySelector('.note-act-btn i[class*="ti-map-pin"]');
      if(pinBtn)pinBtn.className=n.pinned?'ti ti-map-pin-filled':'ti ti-map-pin';
      const footer=card.querySelector('.note-footer');
      if(footer)footer.textContent=(n.pinned?'📌 Fixed . ':'')+timeAgo(n.updated);
      const grip=card.querySelector('.note-drag-icon');
      if(grip)grip.style.opacity=n.pinned?'0.15':'';
    }
  },

  /* ─── GLOBAL SEARCH ─── */
  openGSearch(){
    const el=document.getElementById('gsearch-overlay');if(!el)return;
    el.classList.add('open');
    const inp=document.getElementById('gsearch-input');if(inp){inp.value='';inp.focus();}

  closeGSearch(){document.getElementById('gsearch-overlay')?.classList.remove('open')},
  runGSearch(q){
    const res=document.getElementById('gsearch-results');if(!q.trim()){res.innerHTML='<div class="gs-empty">Start typing...</div>';return;}
    const ql=q.toLowerCase();
    const hits=S.projects.flatMap(p=>p.tasks.filter(t=>t.title.toLowerCase().includes(ql)||t.desc?.toLowerCase().includes(ql)||(t.tags||[]).some(tg=>tg.includes(ql))).map(t=>({t,p})));
    const projHits=S.projects.filter(p=>p.name.toLowerCase().includes(ql)).map(p=>({p,isProj:true}));
    const all=[...projHits,...hits].slice(0,12);
    this._gsResults=all;this._gsIdx=0;
    if(!all.length){res.innerHTML=`<div class="gs-empty">No results for "${q}"</div>`;return;}
    res.innerHTML=all.map((r,i)=>{
      if(r.isProj)return`<div class="gs-result${i===0?' active':''}" data-idx="${i}" onclick="App.gsSelect(${i})"><span style="font-size:18px">${r.p.emoji}</span><span class="gs-task-title" style="font-weight:700">${r.p.name}</span><span class="gs-proj-badge">Project</span></div>`;
      const po=priObj(r.t.priority);
      return`<div class="gs-result${i===0?' active':''}" data-idx="${i}" onclick="App.gsSelect(${i})">
        <span style="font-size:14px">${r.p.emoji}</span>
        <span class="gs-task-title">${r.t.title}</span>
        <span class="gs-proj-badge">${r.p.name}</span>
        <span class="badge" style="background:${po.bg};color:${po.col};flex-shrink:0">${r.t.priority}</span>
        ${r.t.progress===100?'<i class="ti ti-check" style="color:var(--green);font-size:13px"></i>':''}
      </div>`;
    }).join('');
  },
  gsKey(e){
    const res=this._gsResults||[];
    if(e.key==='ArrowDown'){e.preventDefault();this._gsIdx=Math.min((this._gsIdx||0)+1,res.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();this._gsIdx=Math.max((this._gsIdx||0)-1,0);}
    else if(e.key==='Enter'){e.preventDefault();this.gsSelect(this._gsIdx||0);return;}
    else if(e.key==='Escape'){this.closeGSearch();return;}
    document.querySelectorAll('.gs-result').forEach((el,i)=>el.classList.toggle('active',i===this._gsIdx));
    document.querySelector('.gs-result.active')?.scrollIntoView({block:'nearest'});
  },
  gsSelect(i){
    const r=(this._gsResults||[])[i];if(!r)return;
    this.closeGSearch();
    if(r.isProj)this.nav('kanban',r.p.id);
    else{this.nav('kanban',r.p.id);setTimeout(()=>this.openTask(r.t.id),120);}
  },

  /* ─── PROJECT HEALTH RAG ─── */
  calcRAG(p){
    const tasks=p.tasks||[];if(!tasks.length)return{status:'green',label:'On Track',reason:'No tasks yet'};
    const td=today();
    const ov=tasks.filter(t=>t.due&&t.due<td&&t.progress<100).length;
    const total=tasks.length,done=tasks.filter(t=>t.progress===100).length;
    const pct=Math.round(done/total*100);
    const critical=tasks.filter(t=>t.priority==='critical'&&t.progress<100).length;
    if(ov>0||critical>2)return{status:'red',label:'At Risk',reason:ov>0?ov+' overdue':critical+' critical open'};
    if(pct<25&&total>3)return{status:'amber',label:'Needs Attention',reason:'Low completion'};
    if(tasks.filter(t=>t.due&&t.due<=dnow(7)&&t.progress<100).length>0)return{status:'amber',label:'Needs Attention',reason:'Deadlines soon'};
    return{status:'green',label:'On Track',reason:pct+'% complete'};
  },

  /* ─── RECURRING TASKS ─── */
  processRecurring(){
    const td=today();
    S.projects.forEach(p=>{
      const toAdd=[];
      p.tasks.filter(t=>t.recurring&&t.recurring!=='none'&&t.progress===100&&t.due&&t.due<=td).forEach(t=>{
        // Check if a recurrence already spawned
        if(t._recurDone)return;
        const next=new Date(t.due);
        if(t.recurring==='daily')next.setDate(next.getDate()+1);
        else if(t.recurring==='weekly')next.setDate(next.getDate()+7);
        else if(t.recurring==='monthly')next.setMonth(next.getMonth()+1);
        else if(t.recurring==='yearly')next.setFullYear(next.getFullYear()+1);
        const nextStr=next.toISOString().slice(0,10);
        if(!p.tasks.some(x=>x.title===t.title&&x.due===nextStr)){
          const copy=JSON.parse(JSON.stringify(t));
          copy.id='t'+uid();copy.progress=0;copy.due=nextStr;copy.tracked=0;
          copy._timerRunning=false;copy._timerStart=null;copy._recurDone=false;
          copy.completedAt=null;copy.created=copy.updated=Date.now();
          toAdd.push(copy);
          t._recurDone=true;
        }
      });
      toAdd.forEach(t=>p.tasks.push(t));
    });
    if(S.projects.some((p,i)=>p.tasks.length!==S.projects[i]?.tasks.length))save();
  },

  /* ─── DEPENDENCIES ─── */
  addBlocker(taskId){
    const f=findTask(taskId);if(!f)return;
    const all=S.projects.flatMap(p=>p.tasks.map(t=>({t,p}))).filter(r=>r.t.id!==taskId&&!(f.t.blockedBy||[]).includes(r.t.id));
    if(!all.length){this.toast('No other tasks available','err');return;}
    const opts=all.map(r=>'<option value="'+r.t.id+'">'+r.p.emoji+' '+r.t.title.slice(0,40)+'</option>').join('');
    this.confirm('Add Dependency','<div><label style="font-size:12px;color:var(--text2)">This task is blocked by:</label><select id="dep-sel" class="inline-input" style="margin-top:8px">'+opts+'</select></div>',
      ()=>{
        const sel=document.getElementById('dep-sel').value;
        if(!f.t.blockedBy)f.t.blockedBy=[];
        if(!f.t.blockedBy.includes(sel))f.t.blockedBy.push(sel);

  /* ─── REPORTS ─── */
  renderReports(el){
    el.style.display='flex';el.style.flexDirection='column';el.style.overflow='hidden';
    // Build filter state from DOM or defaults
    const projFilter=document.getElementById('rpt-proj')?.value||'';
    const userFilter=document.getElementById('rpt-user')?.value||'';
    const fromDate=document.getElementById('rpt-from')?.value||'';
    const toDate=document.getElementById('rpt-to')?.value||'';
    // Gather all time logs across all projects
    let logs=[];
    S.projects.forEach(p=>{
      p.tasks.forEach(t=>{
        (t.timeLogs||[]).forEach(l=>{
          logs.push({...l,taskTitle:t.title,taskId:t.id,projId:p.id,projName:p.name,projEmoji:p.emoji,projColor:p.color,userName:S.users.find(u=>u.id===l.userId)?.name||'Unknown'});
        });
      });
    });
    // Apply filters
    if(projFilter)logs=logs.filter(l=>l.projId===projFilter);
    if(userFilter)logs=logs.filter(l=>l.userId===userFilter);
    if(fromDate)logs=logs.filter(l=>l.date>=fromDate);
    if(toDate)logs=logs.filter(l=>l.date<=toDate);
    // Sort newest first
    logs.sort((a,b)=>b.start-a.start);
    // Stats
    const totalHrs=logs.reduce((s,l)=>s+(l.duration||0),0);
    const uniqueTasks=new Set(logs.map(l=>l.taskId)).size;
    const uniqueProjs=new Set(logs.map(l=>l.projId)).size;
    const avgSession=logs.length?totalHrs/logs.length:0;
    // Per-project breakdown
    const byProj={};
    logs.forEach(l=>{if(!byProj[l.projId])byProj[l.projId]={name:l.projName,emoji:l.projEmoji,color:l.projColor,hrs:0};byProj[l.projId].hrs+=l.duration||0;});
    const projRows=Object.values(byProj).sort((a,b)=>b.hrs-a.hrs);
    const maxProjHrs=projRows.length?projRows[0].hrs:1;
    // Per-person breakdown
    const byUser={};
    logs.forEach(l=>{if(!byUser[l.userId]){const u=S.users.find(x=>x.id===l.userId);byUser[l.userId]={name:u?.name||'Unknown',color:u?.color||'var(--accent)',hrs:0};}byUser[l.userId].hrs+=l.duration||0;});
    const userRows=Object.values(byUser).sort((a,b)=>b.hrs-a.hrs);
    const maxUserHrs=userRows.length?userRows[0].hrs:1;
    el.innerHTML=`<div class="report-wrap">
      <!-- Filters -->
      <div class="report-filters">
        <select id="rpt-proj" onchange="App.renderReports(document.getElementById('content'))">
          <option value="">All Projects</option>
          ${S.projects.map(p=>`<option value="${p.id}"${projFilter===p.id?' selected':''}>${p.emoji} ${p.name}</option>`).join('')}
        </select>
        <select id="rpt-user" onchange="App.renderReports(document.getElementById('content'))">
          <option value="">All People</option>
          ${S.users.map(u=>`<option value="${u.id}"${userFilter===u.id?' selected':''}>${u.name}</option>`).join('')}
        </select>
        <input type="date" id="rpt-from" value="${fromDate}" onchange="App.renderReports(document.getElementById('content'))" title="From date"/>
        <input type="date" id="rpt-to" value="${toDate}" onchange="App.renderReports(document.getElementById('content'))" title="To date"/>
        <button class="btn btn-ghost" onclick="App.clearReportFilters()" style="font-size:12px"><i class="ti ti-x"></i> Clear</button>
      </div>
      <!-- Stats -->
      <div class="report-stat-row">
        <div class="report-stat"><div class="report-stat-num">${Math.round(totalHrs*10)/10}h</div><div class="report-stat-label">Total Hours</div></div>
        <div class="report-stat"><div class="report-stat-num">${logs.length}</div><div class="report-stat-label">Sessions</div></div>
        <div class="report-stat"><div class="report-stat-num">${uniqueTasks}</div><div class="report-stat-label">Tasks</div></div>
        <div class="report-stat"><div class="report-stat-num">${Math.round(avgSession*60)}m</div><div class="report-stat-label">Avg Session</div></div>
      </div>
      <!-- Breakdown charts side by side -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
        <div class="report-table" style="padding:16px">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px">By Project</div>
          ${projRows.length?projRows.map(r=>`<div class="report-bar-item" style="margin-bottom:10px">
            <span class="report-bar-label">${r.emoji} ${r.name}</span>
            <div class="report-bar-track"><div class="report-bar-fill" style="width:${Math.round(r.hrs/maxProjHrs*100)}%;background:${r.color}"></div></div>
            <span class="report-bar-val">${Math.round(r.hrs*10)/10}h</span>
          </div>`).join(''):'<div style="font-size:12px;color:var(--text3);text-align:center;padding:16px">No data</div>'}
        </div>
        <div class="report-table" style="padding:16px">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px">By Person</div>
          ${userRows.length?userRows.map(r=>`<div class="report-bar-item" style="margin-bottom:10px">
            <span class="report-bar-label">${r.name}</span>
            <div class="report-bar-track"><div class="report-bar-fill" style="width:${Math.round(r.hrs/maxUserHrs*100)}%;background:${r.color}"></div></div>
            <span class="report-bar-val">${Math.round(r.hrs*10)/10}h</span>
          </div>`).join(''):'<div style="font-size:12px;color:var(--text3);text-align:center;padding:16px">No data</div>'}
        </div>
      </div>
      <!-- Log table -->
      <div class="report-table">
        <div class="report-table-head">
          <span>Task</span><span>Project</span><span>Person</span><span>Date</span><span>Duration</span><span>Note</span>
        </div>
        ${logs.length?logs.map(l=>`<div class="report-table-row" onclick="App.openTask('${l.taskId}')">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.taskTitle}</span>
          <span style="color:var(--text2)">${l.projEmoji} ${l.projName}</span>
          <span style="color:var(--text2)">${l.userName}</span>
          <span style="color:var(--text3)">${l.date}</span>
          <span style="font-weight:700;color:var(--accent)">${fmtTime(l.duration||0)}</span>
          <span style="color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.note||'-'}</span>
        </div>`).join(''):`<div style="padding:32px;text-align:center;color:var(--text3);font-size:13px">No time logs found for this period.<br>Use the timer in a task to start logging.</div>`}
      </div>
    </div>`;
  },
  clearReportFilters(){
    ['rpt-proj','rpt-user','rpt-from','rpt-to'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    this.renderReports(document.getElementById('content'));
  },
  exportReportCSV(){
    const projFilter=document.getElementById('rpt-proj')?.value||'';
    const userFilter=document.getElementById('rpt-user')?.value||'';
    const fromDate=document.getElementById('rpt-from')?.value||'';
    const toDate=document.getElementById('rpt-to')?.value||'';
    let logs=[];
    S.projects.forEach(p=>{p.tasks.forEach(t=>{(t.timeLogs||[]).forEach(l=>{logs.push({...l,taskTitle:t.title,projName:p.name,userName:S.users.find(u=>u.id===l.userId)?.name||'Unknown'});});});});
    if(projFilter)logs=logs.filter(l=>l.projId===projFilter);
    if(userFilter)logs=logs.filter(l=>l.userId===userFilter);
    if(fromDate)logs=logs.filter(l=>l.date>=fromDate);
    if(toDate)logs=logs.filter(l=>l.date<=toDate);
    logs.sort((a,b)=>b.start-a.start);
    const rows=[['Date','Task','Project','Person','Duration (hrs)','Note']];
    logs.forEach(l=>rows.push([l.date,l.taskTitle,l.projName,l.userName,Math.round((l.duration||0)*100)/100,l.note||'']));
    const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='time-report.csv';a.click();
    this.toast('Report exported','ok');
  },
  removeTimeLog(taskId,logId){
    const f=findTask(taskId);if(!f)return;
    f.t.timeLogs=(f.t.timeLogs||[]).filter(l=>l.id!==logId);
    // Recalculate tracked total
    f.t.tracked=f.t.timeLogs.reduce((s,l)=>s+(l.duration||0),0);
    f.t.updated=Date.now();save();this.showModal(f.t,f.p);
  },

  /* ─── ATTACHMENTS ─── */
  fileIcon(type){
    if(!type)return 'ti-paperclip';
    if(type.startsWith('image/'))return 'ti-photo';
    if(type.includes('pdf'))return 'ti-file-type-pdf';
    if(type.includes('word')||type.includes('document'))return 'ti-file-type-doc';
    if(type.includes('sheet')||type.includes('excel')||type.includes('csv'))return 'ti-file-type-xls';
    if(type.includes('zip')||type.includes('rar'))return 'ti-file-zip';
    return 'ti-file';
  },
  fmtSize(bytes){
    if(!bytes)return '';
    if(bytes<1024)return bytes+'B';
    if(bytes<1048576)return Math.round(bytes/1024)+'KB';
    return Math.round(bytes/1048576*10)/10+'MB';
  },
  attachClick(taskId){
    const inp=document.getElementById('att-input-'+taskId);
    if(inp)inp.click();
  },
  attachDrop(e,taskId){
    e.preventDefault();
    const drop=document.getElementById('att-drop-'+taskId);
    if(drop)drop.classList.remove('drag-over');
    this.attachFiles(taskId,e.dataTransfer.files);
  },
  attachFiles(taskId,files){
    const f=findTask(taskId);if(!f||!files||!files.length)return;
    const MAX=4*1024*1024; // 4MB per file warning threshold
    let warn=false;
    Array.from(files).forEach(file=>{
      if(file.size>MAX)warn=true;
      const reader=new FileReader();
      reader.onload=ev=>{
        if(!f.t.attachments)f.t.attachments=[];
        f.t.attachments.push({id:'a'+uid(),name:file.name,size:file.size,type:file.type,dataUrl:ev.target.result,uploaded:Date.now()});
        f.t.updated=Date.now();save();
        // Refresh attachment list in modal without closing it
        const list=document.getElementById('att-list-'+taskId);
        if(list){
          const a=f.t.attachments.at(-1);
          const div=document.createElement('div');div.className='attachment-item';
          div.innerHTML=`<i class="ti ${App.fileIcon(a.type)} attachment-icon"></i><span class="attachment-name" title="${a.name}">${a.name}</span><span class="attachment-size">${App.fmtSize(a.size)}</span><button class="attachment-dl" onclick="App.downloadAttachment('${taskId}','${a.id}')" title="Download"><i class="ti ti-download" style="font-size:12px"></i></button><button class="attachment-rm" onclick="App.removeAttachment('${taskId}','${a.id}')" title="Remove"><i class="ti ti-x" style="font-size:12px"></i></button>`;
          list.appendChild(div);
        }
        this.toast(file.name+' attached','ok');
      };
      reader.readAsDataURL(file);
    });
    if(warn)this.toast('Large file -- may affect storage','info');
  },
  downloadAttachment(taskId,attId){
    const f=findTask(taskId);if(!f)return;
    const a=(f.t.attachments||[]).find(x=>x.id===attId);if(!a)return;
    const link=document.createElement('a');link.href=a.dataUrl;link.download=a.name;link.click();
  },
  removeAttachment(taskId,attId){
    const f=findTask(taskId);if(!f)return;
    this.confirm('Remove Attachment','Remove this file from the task?',()=>{
      f.t.attachments=(f.t.attachments||[]).filter(x=>x.id!==attId);
      f.t.updated=Date.now();save();
      this.showModal(f.t,f.p);
    },'Remove','danger');
  },

  /* ─── DASHBOARD KPI EDITOR ─── */
  editDashKPIs(){
    const builtIn=[
      {id:'kpi-total',   label:'Total Tasks',  color:'var(--blue)',   type:'total'},
      {id:'kpi-done',    label:'Completed',    color:'var(--green)',  type:'done'},
      {id:'kpi-inprog',  label:'In Progress',  color:'var(--amber)',  type:'inprog'},
      {id:'kpi-overdue', label:'Overdue',      color:'var(--red)',    type:'overdue'},
      {id:'kpi-onhold',  label:'On Hold',      color:'var(--orange)', type:'onhold'},
      {id:'kpi-notstart',label:'Not Started',  color:'var(--text3)',  type:'notstarted'},
    ];
    // Collect unique column titles across all projects, deduplicated by title
    const seenTitles=new Set(builtIn.map(b=>b.label.toLowerCase()));
    const colOptions=[];
    S.projects.forEach(p=>p.columns.forEach(c=>{
      const titleKey=c.title.trim().toLowerCase();
      if(!seenTitles.has(titleKey)){seenTitles.add(titleKey);colOptions.push({id:'kpi-col-'+titleKey.replace(/\s+/g,'-'),label:c.title,color:c.color,type:'col',colTitle:c.title});}
    }));
    const allOptions=[...builtIn,...colOptions];
    const checks=allOptions.map(opt=>{
      const active=(S.dashKPIs||[]).some(k=>k.id===opt.id||(k.type==='col'&&k.colTitle===opt.colTitle));
      return`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:6px">
        <div style="width:12px;height:12px;border-radius:50%;background:${opt.color};flex-shrink:0"></div>
        <span style="flex:1;font-size:13px">${opt.label}</span>
        <input type="checkbox" data-kpi='${JSON.stringify(opt)}' ${active?'checked':''} style="width:15px;height:15px;cursor:pointer"/>
      </div>`;
    }).join('');
    this.confirm('Customise Dashboard KPIs',
      `<p style="font-size:12px;color:var(--text3);margin-bottom:12px">Choose which KPIs appear in the top strip. Column KPIs show tasks currently in that column across all projects.</p>${checks}`,
      ()=>{
        const newKPIs=[];
        document.querySelectorAll('#confirm-wrap input[type=checkbox]').forEach(cb=>{
          if(cb.checked){try{newKPIs.push(JSON.parse(cb.dataset.kpi));}catch(e){}}
        });
        S.dashKPIs=newKPIs;save();
        if(S.view==='dashboard')this.renderDash(document.getElementById('content'));
        else this.renderDash(document.getElementById('content'));
        this.toast('KPIs updated','ok');
      },'Save');
  },
  /* ─── COMMAND PALETTE ─── */
  _cmdIdx:0,
  _cmdItems:[],
  openCmd(){
    const el=document.getElementById('cmd-overlay');if(!el)return;
    el.classList.add('open');
    const inp=document.getElementById('cmd-input');if(inp){inp.value='';inp.focus();}
    this._cmdIdx=0;
    this.runCmd('');
  },
  closeCmd(){
    document.getElementById('cmd-overlay')?.classList.remove('open');
    this._cmdItems=[];
  },
  runCmd(q){
    const ql=q.toLowerCase().trim();
    const items=[];

    // ── Navigation actions (always shown when no query, or matching)
    const navActions=[
      {icon:'ti-layout-dashboard',label:'Go to Dashboard',sub:'',action:()=>this.nav('dashboard'),kbd:''},
      {icon:'ti-folders',label:'Go to All Projects',sub:'',action:()=>this.nav('projects'),kbd:''},
      {icon:'ti-notes',label:'Go to Notes',sub:'',action:()=>this.nav('notes'),kbd:''},
      {icon:'ti-calendar',label:'Go to Calendar',sub:'',action:()=>this.nav('calendar'),kbd:''},
      {icon:'ti-timeline',label:'Go to Timeline',sub:'',action:()=>this.nav('gantt'),kbd:''},
      {icon:'ti-chart-bar',label:'Go to Reports',sub:'',action:()=>this.nav('reports'),kbd:''},
      {icon:'ti-settings',label:'Go to Settings',sub:'',action:()=>this.nav('settings'),kbd:''},
    ].filter(a=>!ql||a.label.toLowerCase().includes(ql));
    if(navActions.length)items.push({type:'section',label:'Navigate'},...navActions.map(a=>({type:'action',icon:a.icon,label:a.label,sub:a.sub,action:a.action,kbd:a.kbd})));

    // ── Projects
    const projs=S.projects.filter(p=>!ql||p.name.toLowerCase().includes(ql));
    if(projs.length)items.push({type:'section',label:'Projects'},...projs.map(p=>({type:'action',icon:null,emoji:p.emoji,label:p.name,sub:'Project',action:()=>this.nav('kanban',p.id),bg:p.color+'22',color:p.color})));

    // ── Tasks (search across all projects)
    if(ql){
      const taskHits=S.projects.flatMap(p=>p.tasks.filter(t=>t.title.toLowerCase().includes(ql)||(t.tags||[]).some(tg=>tg.toLowerCase().includes(ql))).map(t=>({t,p}))).slice(0,8);
      if(taskHits.length)items.push({type:'section',label:'Tasks'},...taskHits.map(({t,p})=>({type:'action',icon:'ti-check',label:t.title,sub:p.emoji+' '+p.name,action:()=>{this.nav('kanban',p.id);setTimeout(()=>this.openTask(t.id),120);},prio:t.priority})));
    }

    // ── Quick actions (always visible when query is empty)
    if(!ql){
      const quickActions=[
        {icon:'ti-plus',label:'New Task',sub:'In current project',action:()=>this.addTask(),kbd:''},
        {icon:'ti-file-plus',label:'New Project',sub:'',action:()=>this.newProject(),kbd:''},
        {icon:'ti-notes',label:'New Note',sub:'',action:()=>this.addNote(),kbd:''},
        {icon:'ti-moon',label:'Toggle Dark / Light Mode',sub:'',action:()=>this.toggleDark(),kbd:''},
        {icon:'ti-download',label:'Export Backup (JSON)',sub:'',action:()=>this.exportData(),kbd:''},
        {icon:'ti-table',label:'Export CSV',sub:'',action:()=>this.exportCSV(),kbd:''},
        {icon:'ti-file-text',label:'Export PDF Report',sub:'',action:()=>this.exportPDF(),kbd:''},
      ];
      items.push({type:'section',label:'Quick Actions'},...quickActions.map(a=>({type:'action',icon:a.icon,label:a.label,sub:a.sub,action:a.action,kbd:a.kbd})));
    }

    this._cmdItems=items.filter(x=>x.type==='action');
    this._cmdIdx=0;

    const el=document.getElementById('cmd-results');
    if(!el)return;
    if(!items.length){el.innerHTML='<div style="padding:28px;text-align:center;color:var(--text3);font-size:13px">No results</div>';return;}

    let actionIdx=0;
    el.innerHTML=items.map(item=>{
      if(item.type==='section')return`<div class="cmd-section">${item.label}</div>`;
      const myIdx=actionIdx++;
      const iconEl=item.emoji?`<div class="cmd-icon" style="background:${item.bg||'var(--bg3)'}"><span style="font-size:18px">${item.emoji}</span></div>`:`<div class="cmd-icon" style="${item.bg?'background:'+item.bg:''}"><i class="ti ${item.icon}" style="color:${item.color||'var(--accent2)'}"></i></div>`;
      const prioEl=item.prio?`<span class="cmd-sub" style="font-size:10px">${item.prio}</span>`:'';
      return`<div class="cmd-item${myIdx===0?' active':''}" data-idx="${myIdx}" onclick="App.cmdSelect(${myIdx})">${iconEl}<span class="cmd-label">${item.label}</span>${prioEl}<span class="cmd-sub">${item.sub||''}</span></div>`;
    }).join('');
  },
  cmdKey(e){
    const items=this._cmdItems;
    if(e.key==='ArrowDown'){e.preventDefault();this._cmdIdx=Math.min((this._cmdIdx||0)+1,items.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();this._cmdIdx=Math.max((this._cmdIdx||0)-1,0);}
    else if(e.key==='Enter'){e.preventDefault();this.cmdSelect(this._cmdIdx);return;}
    else if(e.key==='Escape'){this.closeCmd();return;}
    document.querySelectorAll('.cmd-item').forEach((el,i)=>el.classList.toggle('active',i===this._cmdIdx));
    document.querySelector('.cmd-item.active')?.scrollIntoView({block:'nearest'});
  },
  cmdSelect(idx){
    const item=this._cmdItems[idx];if(!item)return;
    this.closeCmd();
    item.action();
  },
};

App.init();
</script>
</body>
</html>
