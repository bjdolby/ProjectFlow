<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ProjectFlow — Project & Task Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--bg2:#18181c;--bg3:#222228;--bg4:#2c2c35;
  --surface:#1e1e24;--surface2:#28282f;--surface3:#323239;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f4;--text2:#a8a8b8;--text3:#6b6b80;
  --accent:#7c6fff;--accent2:#a594ff;--accent-bg:rgba(124,111,255,0.15);
  --green:#34d399;--green-bg:rgba(52,211,153,0.15);
  --red:#f87171;--red-bg:rgba(248,113,113,0.15);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.15);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.15);
  --pink:#f472b6;--pink-bg:rgba(244,114,182,0.15);
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,0.15);
  --orange:#fb923c;--orange-bg:rgba(251,146,60,0.15);
  --r:10px;--r2:14px;--r3:20px;
  --shadow:0 4px 32px rgba(0,0,0,0.5);
  --font:'DM Sans',sans-serif;--font-display:'Syne',sans-serif;
}
.light{
  --bg:#f0f0f5;--bg2:#ffffff;--bg3:#eaeaf2;--bg4:#dddde8;
  --surface:#ffffff;--surface2:#f6f6fb;--surface3:#ededf5;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --text:#1a1a2e;--text2:#52527a;--text3:#9090b0;
  --accent:#6c5ce7;--accent2:#8b7cf8;--accent-bg:rgba(108,92,231,0.1);
  --shadow:0 4px 24px rgba(0,0,0,0.1);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text);font-size:14px;line-height:1.5;transition:background 0.2s,color 0.2s}
#app{display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ── SIDEBAR ── */
#sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width 0.25s ease,min-width 0.25s ease;z-index:50}
#sidebar.collapsed{width:56px;min-width:56px}
#sidebar.collapsed .sb-text{display:none}
#sidebar.collapsed .sb-label{visibility:hidden}
.sb-logo{padding:18px 16px 10px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.sb-logo-icon{width:32px;height:32px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font-display);font-weight:800;color:#fff;font-size:13px;letter-spacing:-0.5px}
.sb-logo-text{font-family:var(--font-display);font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden}
.sb-logo-text span{color:var(--accent)}
.sb-section{padding:6px 8px;flex:1;overflow-y:auto;overflow-x:hidden}
.sb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);padding:8px 8px 5px;white-space:nowrap}
.sb-item{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:9px;cursor:pointer;transition:all 0.15s;color:var(--text2);position:relative;min-height:34px}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--accent-bg);color:var(--accent)}
.sb-item i{font-size:17px;flex-shrink:0;width:20px;text-align:center}
.sb-item-text{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:auto}
.sb-divider{height:1px;background:var(--border);margin:6px 0}
.sb-bottom{padding:8px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:9px;cursor:pointer}
.sb-user:hover{background:var(--bg3)}
.sb-edit-icon{font-size:11px;color:var(--text3);flex-shrink:0;opacity:0;transition:opacity 0.15s}
.sb-user:hover .sb-edit-icon{opacity:1}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;letter-spacing:-0.3px}
.av-sm{width:22px;height:22px;font-size:9px}
.av-lg{width:36px;height:36px;font-size:13px}
.sb-user-name{font-size:12px;font-weight:600;white-space:nowrap}
.sb-user-role{font-size:11px;color:var(--text3)}

/* ── TOPBAR ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;background:var(--bg2);flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.tb-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;transition:all 0.15s;white-space:nowrap;user-select:none}
.btn:hover{background:var(--bg3)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-ghost{border-color:transparent}
.btn-ghost:hover{background:var(--bg3);border-color:transparent}
.btn-danger{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn i{font-size:15px}
.icon-btn{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:16px;flex-shrink:0}
.icon-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.view-tabs{display:flex;align-items:center;background:var(--bg3);padding:3px;border-radius:9px;border:1px solid var(--border);position:relative}
.view-tab{padding:4px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:color 0.2s;display:flex;align-items:center;gap:5px;user-select:none;position:relative;z-index:1;white-space:nowrap}
.view-tab:hover{color:var(--text)}
.view-tab.active{color:var(--text)}
.view-tab i{font-size:13px}
.view-tabs-slider{position:absolute;top:3px;bottom:3px;border-radius:7px;background:var(--bg2);box-shadow:0 1px 6px rgba(0,0,0,0.25);transition:left 0.2s cubic-bezier(0.4,0,0.2,1),width 0.2s cubic-bezier(0.4,0,0.2,1);z-index:0;pointer-events:none}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;overflow:hidden}
.breadcrumb-sep{color:var(--text3);font-size:12px}
.breadcrumb-link{color:var(--accent);font-size:12px;cursor:pointer;transition:opacity 0.15s}
.breadcrumb-link:hover{opacity:0.75;text-decoration:underline}

/* ── CONTENT ── */
#content{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

/* ── SEARCH BAR ── */
.filter-bar{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:340px}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:6px 12px 6px 34px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color 0.15s}
.search-input:focus{border-color:var(--accent)}
.filter-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;user-select:none;font-family:var(--font)}
.filter-chip:hover{background:var(--bg3);color:var(--text)}
.filter-chip.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}

/* ── KANBAN ── */
#kanban-wrap{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;gap:14px;padding:16px 18px 24px;align-items:flex-start}
.k-col{min-width:282px;width:282px;display:flex;flex-direction:column;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;flex-shrink:0;max-height:calc(100vh - 196px);transition:width 0.2s,min-width 0.2s}
.k-col.collapsed{width:50px;min-width:50px}
.k-col-header{padding:11px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;cursor:grab;user-select:none}
.k-col-header:active{cursor:grabbing}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.col-title{font-weight:600;font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-count{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0}
.col-actions{display:flex;gap:2px;opacity:0;transition:opacity 0.15s;flex-shrink:0}
.k-col:hover .col-actions{opacity:1}
.col-act-btn{width:22px;height:22px;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s}
.col-act-btn:hover{background:var(--bg4);color:var(--text)}
.col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px}
.col-add-btn{margin:4px 8px 8px;display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:9px;border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;width:calc(100% - 16px);font-family:var(--font)}
.col-add-btn:hover{background:var(--bg3);color:var(--text);border-style:solid}
.col-add-btn i{font-size:14px}
.k-col.drag-target .col-body{background:var(--accent-bg);border-radius:8px}
.add-col-btn{min-width:210px;width:210px;border:2px dashed var(--border2);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all 0.2s;padding:40px 20px;flex-shrink:0;color:var(--text3)}
.add-col-btn:hover{background:var(--bg2);border-color:var(--accent);color:var(--accent)}
.add-col-btn i{font-size:28px}
.add-col-btn span{font-size:12px;font-weight:600}

/* ── TASK CARD ── */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all 0.2s;user-select:none;position:relative}
.task-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px);box-shadow:var(--shadow)}
.task-card.dragging{opacity:0.4;transform:scale(0.97) rotate(1.5deg)}
.task-card.drag-over{border-color:var(--accent);border-style:dashed;background:var(--accent-bg)}
.card-labels{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.label{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase}
.card-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:8px;color:var(--text)}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-prio{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:0.03em}
.card-due{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text3)}
.card-due.overdue{color:var(--red)}
.card-due i{font-size:11px}
.card-assignees{display:flex;margin-left:auto}
.card-assignees .avatar{margin-left:-5px;border:2px solid var(--surface)}
.card-progress-bar{height:3px;background:var(--bg4);border-radius:2px;margin-top:8px;overflow:hidden}
.card-progress-fill{height:100%;border-radius:2px;transition:width 0.3s}
.card-subtask-info{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px;margin-top:5px}
.card-subtask-info i{font-size:11px}

/* Priority colours */
.p-critical{background:var(--red-bg);color:var(--red)}
.p-high{background:var(--amber-bg);color:var(--amber)}
.p-medium{background:var(--blue-bg);color:var(--blue)}
.p-low{background:var(--green-bg);color:var(--green)}

/* Label colours */
.l-0{background:rgba(124,111,255,0.18);color:#a594ff}
.l-1{background:var(--green-bg);color:var(--green)}
.l-2{background:var(--blue-bg);color:var(--blue)}
.l-3{background:var(--amber-bg);color:var(--amber)}
.l-4{background:var(--pink-bg);color:var(--pink)}
.l-5{background:var(--teal-bg);color:var(--teal)}
.l-6{background:var(--red-bg);color:var(--red)}

/* ── TASK MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:flex-start;justify-content:flex-end;backdrop-filter:blur(6px)}
#task-modal{width:620px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;animation:slideInRight 0.25s ease;box-shadow:-8px 0 40px rgba(0,0,0,0.4)}
@keyframes slideInRight{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}
.modal-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;position:sticky;top:0;background:var(--bg2);z-index:10}
.modal-title-wrap{flex:1;min-width:0}
.modal-title-input{font-family:var(--font-display);font-weight:700;font-size:18px;background:none;border:none;color:var(--text);width:100%;outline:none;resize:none;line-height:1.3;min-height:52px;overflow:hidden}
.modal-subtitle{font-size:11px;color:var(--text3);margin-top:4px}
.modal-body{padding:18px;flex:1;display:flex;flex-direction:column;gap:18px}
.m-section{display:flex;flex-direction:column;gap:7px}
.m-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
.m-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.m-field{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg3);border-radius:9px;border:1px solid var(--border)}
.m-field i{color:var(--text3);font-size:16px;flex-shrink:0}
.m-field input,.m-field select,.m-field textarea{background:none;border:none;color:var(--text);font-family:var(--font);font-size:13px;outline:none;flex:1;min-width:0}
.m-field select option{background:var(--bg2);color:var(--text)}
.m-field.overdue{border-color:var(--red)}
.m-textarea{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;resize:vertical;min-height:76px;line-height:1.6}
.m-textarea:focus{border-color:var(--accent)}
.prog-track{width:100%;-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:var(--bg4);outline:none;cursor:pointer}
.prog-track::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2);cursor:pointer;box-shadow:0 2px 6px rgba(124,111,255,0.5)}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:3px}
.prog-pct{font-weight:700;color:var(--accent)}
.check-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.check-item:last-child{border-bottom:none}
.checkbox{width:16px;height:16px;border-radius:5px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.checkbox.checked{background:var(--green);border-color:var(--green)}
.checkbox.checked::after{content:'✓';color:#fff;font-size:10px;font-weight:800}
.check-text-input{flex:1;background:none;border:none;color:var(--text);font-family:var(--font);font-size:13px;outline:none}
.check-text-input.done{text-decoration:line-through;color:var(--text3)}
.assignee-grid{display:flex;flex-wrap:wrap;gap:6px}
.assignee-pill{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 5px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:12px;font-weight:500}
.assignee-pill.selected{border-color:currentColor}
.assignee-pill:hover{background:var(--bg4)}
.tag-wrap{display:flex;flex-wrap:wrap;gap:5px}
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;background:var(--accent-bg);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer}
.tag i{font-size:10px;opacity:0.7}
.tag-add{background:var(--bg3);color:var(--text3);border:1px dashed var(--border2)}
.tag-add:hover{background:var(--bg4);color:var(--text)}
.timer-box{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border-radius:9px;border:1px solid var(--border)}
.timer-display{font-family:'Courier New',monospace;font-size:20px;font-weight:700;flex:1;letter-spacing:0.05em}
.timer-btn{padding:5px 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-size:12px;font-weight:700;font-family:var(--font);transition:all 0.15s;display:flex;align-items:center;gap:5px}
.timer-btn:hover{background:var(--bg4)}
.timer-btn.running{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.comment-item{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.comment-item:last-child{border-bottom:none}
.comment-meta{font-size:11px;margin-bottom:2px}
.comment-author{font-weight:700;color:var(--text)}
.comment-time{color:var(--text3);margin-left:6px}
.comment-text{font-size:13px;color:var(--text2);line-height:1.5}
.comment-row{display:flex;gap:8px;align-items:flex-start;margin-top:6px}
.comment-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;resize:none;min-height:38px}
.comment-input:focus{border-color:var(--accent)}

/* ── DASHBOARD ── */
.dash-wrap{flex:1;overflow-y:auto;padding:22px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px;position:relative;overflow:hidden;transition:all 0.2s}
.stat-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.stat-accent{position:absolute;top:0;right:0;width:56px;height:56px;border-radius:0 var(--r2) 0 100%;opacity:0.18}
.stat-num{font-family:var(--font-display);font-size:30px;font-weight:800;line-height:1}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-sub{font-size:11px;margin-top:6px;font-weight:600}
.dash-2col{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:22px}
.dash-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.d-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.d-card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.d-card-title{font-family:var(--font-display);font-weight:700;font-size:14px}
.d-row{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.d-row:last-child{border-bottom:none}
.d-row:hover{background:var(--surface2)}
.d-row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.d-row-title{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-bar{height:3px;background:var(--bg4);border-radius:2px;width:80px;margin-top:3px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px}
.act-item{display:flex;align-items:flex-start;gap:9px;padding:11px 18px;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.act-text{font-size:12px;color:var(--text2);line-height:1.5}
.act-text strong{color:var(--text)}
.act-time{font-size:11px;color:var(--text3);margin-top:2px}

/* ── PROJECTS VIEW ── */
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:20px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;cursor:pointer;transition:all 0.2s}
.proj-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-2px)}
.proj-card.new-card{border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:200px}
.proj-card.new-card:hover{border-color:var(--accent);color:var(--accent)}
.proj-emoji{font-size:30px;margin-bottom:8px}
.proj-name{font-family:var(--font-display);font-weight:700;font-size:17px}
.proj-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.proj-stats{display:flex;gap:16px;margin:14px 0}
.proj-stat strong{font-size:15px;font-weight:700;display:block}
.proj-stat span{font-size:11px;color:var(--text3)}
.team-stack{display:flex}
.team-stack .avatar{margin-left:-6px;border:2px solid var(--surface)}
.team-stack .avatar:first-child{margin-left:0}
.proj-prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px}
.proj-prog-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.proj-prog-fill{height:100%;border-radius:2px;transition:width 0.5s}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}

/* ── CALENDAR ── */
.cal-wrap{flex:1;overflow-y:auto;padding:20px}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.cal-month{font-family:var(--font-display);font-weight:700;font-size:20px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-head{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:8px;text-transform:uppercase;letter-spacing:0.05em}
.cal-add-hint{display:none;font-size:10px;color:var(--accent);margin-left:4px;font-weight:700}
.cal-cell:hover .cal-add-hint{display:inline}
.cal-cell:hover{background:var(--bg3);cursor:pointer}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:9px;min-height:92px;padding:8px;transition:border-color 0.15s}
.cal-cell.today{border-color:var(--accent);background:var(--accent-bg)}
.cal-cell.other-month{opacity:0.38}
.cal-day{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.cal-event{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;cursor:pointer;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity 0.15s}
.cal-event:hover{opacity:0.8}

/* ── GANTT ── */
.gantt-wrap{flex:1;overflow:auto;padding:20px}
.gantt-head{display:flex;border-bottom:2px solid var(--border);padding-bottom:10px;margin-bottom:8px}
.g-name-col{width:230px;flex-shrink:0;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em}
.g-timeline{flex:1;position:relative;height:22px}
.g-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.g-task-name{width:230px;flex-shrink:0;font-size:12px;font-weight:500;padding-right:14px;display:flex;align-items:center;gap:7px;overflow:hidden;border-radius:6px;transition:background 0.15s;padding:4px 8px 4px 0}
.g-task-name:hover{background:var(--bg3);color:var(--accent)}
.g-bars{flex:1;position:relative;height:26px}
.g-bar{position:absolute;height:22px;border-radius:5px;top:2px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;cursor:pointer;transition:filter 0.15s}
.g-bar:hover{filter:brightness(1.15)}
.g-today-line{position:absolute;top:0;width:2px;background:var(--red);height:100%;opacity:0.6}

/* ── SETTINGS ── */
.settings-wrap{flex:1;overflow-y:auto;padding:24px;max-width:680px}
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:14px}
.settings-section-title{font-family:var(--font-display);font-weight:700;font-size:15px;margin-bottom:16px}
.s-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.s-row:last-child{border-bottom:none}
.s-row-label{flex:1}
.s-row-label h4{font-size:13px;font-weight:600}
.s-row-label p{font-size:12px;color:var(--text2);margin-top:2px}
.toggle{width:38px;height:21px;border-radius:11px;background:var(--bg4);cursor:pointer;position:relative;border:none;transition:background 0.2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2.5px;left:2.5px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.35)}
.toggle.on::after{transform:translateX(17px)}

/* ── LIST VIEW ── */
.list-wrap{flex:1;overflow-y:auto;padding:16px 18px}
.list-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.list-head{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 90px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.list-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 90px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;align-items:center}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:var(--surface2)}
.list-title-cell{display:flex;align-items:center;gap:8px;overflow:hidden}
.list-title-text{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-mini-prog{display:flex;align-items:center;gap:5px}
.list-mini-bar{width:42px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;flex-shrink:0}
.list-mini-fill{height:100%;background:var(--accent);border-radius:2px}

/* ── QUICK ADD ── */
#quick-add-bar{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:28px;padding:6px 8px 6px 18px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 40px rgba(0,0,0,0.5);z-index:300;min-width:360px;display:none}
#qa-input{background:none;border:none;color:var(--text);font-family:var(--font);font-size:13px;outline:none;flex:1}
#qa-input::placeholder{color:var(--text3)}

/* ── TOASTS ── */
#toasts{position:fixed;bottom:22px;right:22px;z-index:500;display:flex;flex-direction:column-reverse;gap:7px}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:10px 15px;font-size:13px;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;animation:toastUp 0.3s ease;pointer-events:none;max-width:300px}
.toast.ok{border-color:var(--green)}
.toast.err{border-color:var(--red)}
.toast.info{border-color:var(--accent)}
@keyframes toastUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast i{font-size:15px}

/* ── CONFIRM ── */
#confirm-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.confirm-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:26px;width:380px;animation:popUp 0.2s ease}
@keyframes popUp{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
.confirm-box h3{font-family:var(--font-display);font-weight:700;font-size:17px;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;text-align:center;color:var(--text3)}
.empty i{font-size:36px;margin-bottom:10px;opacity:0.45}
.empty h3{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:5px}
.empty p{font-size:12px}

/* ── INPUT OVERRIDE ── */
.inline-input{background:var(--bg3);border:1px solid var(--accent);border-radius:8px;padding:5px 9px;color:var(--text);font-family:var(--font);font-size:13px;font-weight:600;outline:none;width:100%}

/* ── MOBILE ── */
@media(max-width:860px){
  #sidebar{position:fixed;z-index:100;height:100vh;transform:translateX(-240px);transition:transform 0.25s ease,width 0.25s ease}
  #sidebar.open{transform:translateX(0)}
  .dash-grid{grid-template-columns:1fr 1fr}
  .dash-2col{grid-template-columns:1fr}
  .dash-3col{grid-template-columns:1fr}
  .proj-grid{grid-template-columns:1fr}
  #task-modal{width:100vw}
  #quick-add-bar{left:14px;right:14px;transform:none;min-width:0}
  .m-grid2{grid-template-columns:1fr}
}

/* ── PROJECT CARD ACTIONS ── */
.proj-card{position:relative}
.proj-card-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.15s;margin-left:auto}
.proj-card:hover .proj-card-actions{opacity:1}
.proj-act-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s}
.proj-act-btn:hover{background:var(--bg4);color:var(--text)}
.proj-act-btn.danger:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.proj-notes{font-size:12px;color:var(--text2);margin-top:6px;margin-bottom:10px;padding:7px 10px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);line-height:1.5}

/* ── QUICK LINKS ── */
.ql-item{display:flex;align-items:center;gap:8px;padding:5px 9px;border-radius:8px;cursor:pointer;transition:all 0.15s;color:var(--text2);font-size:12px;font-weight:500}
.ql-item:hover{background:var(--bg3);color:var(--text)}
.ql-item i.ql-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;color:var(--accent2)}
.ql-item-actions{display:flex;gap:1px;opacity:0;transition:opacity 0.15s;flex-shrink:0}
.ql-item:hover .ql-item-actions{opacity:1}
.ql-add-btn{display:flex;align-items:center;gap:6px;padding:5px 9px;border-radius:8px;cursor:pointer;color:var(--text3);font-size:11px;font-weight:500;border:1px dashed var(--border2);background:transparent;width:100%;font-family:var(--font);transition:all 0.15s;margin-top:3px}
.ql-add-btn:hover{background:var(--bg3);color:var(--text);border-style:solid}

/* ── NOTES ── */
#notes-canvas{position:relative;flex:1;overflow:auto;background:var(--bg)}
.note-sticky{position:absolute;width:240px;min-height:100px;min-width:120px;display:flex;flex-direction:column;border-radius:3px 12px 12px 3px;padding:0;box-shadow:3px 4px 18px rgba(0,0,0,0.35);transition:box-shadow 0.15s,transform 0.15s;user-select:none;resize:both;overflow:hidden}
.note-sticky:hover{box-shadow:6px 8px 28px rgba(0,0,0,0.5);z-index:10}
.note-sticky:focus{outline:2px solid rgba(0,0,0,0.3);outline-offset:2px}
.note-sticky:focus-visible{outline:2px solid rgba(0,0,0,0.4)}
.note-sticky.is-fixed{transform:rotate(0deg)!important;box-shadow:2px 3px 12px rgba(0,0,0,0.3)}
.note-sticky.is-header{border-radius:6px;min-width:220px}
.note-sticky.is-header .note-title-inp{font-size:18px;font-weight:800;padding:4px 12px 6px}
.note-sticky.is-header .note-body{font-size:13px}
.note-sticky.dragging{box-shadow:10px 14px 40px rgba(0,0,0,0.6);z-index:100;transition:none}
.note-drag-handle{padding:8px 10px 4px;cursor:grab;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-radius:3px 12px 0 0}
.note-drag-handle:active{cursor:grabbing}
.note-drag-icon{opacity:0.4;font-size:12px;transition:opacity 0.15s}
.note-sticky:hover .note-drag-icon{opacity:0.7}
.note-sticky-actions{display:flex;gap:1px;opacity:0;transition:opacity 0.15s}
.note-sticky:hover .note-sticky-actions{opacity:1}
.note-act-btn{width:22px;height:22px;border-radius:6px;border:none;background:rgba(0,0,0,0.15);color:rgba(0,0,0,0.55);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.15s}
.note-act-btn:hover{background:rgba(0,0,0,0.25);color:rgba(0,0,0,0.85)}
.note-title-inp{font-family:var(--font-display);font-weight:700;font-size:13px;color:rgba(0,0,0,0.75);outline:none;line-height:1.3;word-break:break-word;padding:0 10px 4px;background:transparent;border:none}
.note-title-inp:focus{color:rgba(0,0,0,0.9)}
.note-body{flex:1;font-size:12px;color:rgba(0,0,0,0.65);line-height:1.6;outline:none;white-space:pre-wrap;word-break:break-word;min-height:80px;padding:0 10px 8px;background:transparent;border:none;resize:none;font-family:var(--font)}
.note-body:focus{color:rgba(0,0,0,0.85)}
.note-footer{font-size:10px;color:rgba(0,0,0,0.4);padding:5px 10px;border-top:1px solid rgba(0,0,0,0.1);flex-shrink:0}
.notes-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:10px;pointer-events:none}
.notes-empty i{font-size:40px;opacity:0.3}

/* ── GLOBAL SEARCH ── */
#gsearch-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding-top:80px;backdrop-filter:blur(4px)}
#gsearch-overlay.open{display:flex}
#gsearch-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:560px;max-width:90vw;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
#gsearch-input{width:100%;background:transparent;border:none;outline:none;padding:16px 18px;font-size:16px;color:var(--text);font-family:var(--font);border-bottom:1px solid var(--border)}
#gsearch-results{max-height:380px;overflow-y:auto}
.gs-result{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;transition:background 0.12s;border-bottom:1px solid var(--border)}
.gs-result:last-child{border-bottom:none}
.gs-result:hover,.gs-result.active{background:var(--bg3)}
.gs-proj-badge{font-size:11px;color:var(--text3);flex-shrink:0}
.gs-task-title{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gs-empty{padding:28px;text-align:center;color:var(--text3);font-size:13px}
.gs-hint{padding:8px 18px;font-size:11px;color:var(--text3);display:flex;justify-content:space-between;border-top:1px solid var(--border)}
/* ── HEALTH RAG ── */
.rag-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block}
.rag-green{background:var(--green)}
.rag-amber{background:var(--amber)}
.rag-red{background:var(--red)}
.rag-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.rag-badge.green{background:var(--green-bg);color:var(--green)}
.rag-badge.amber{background:var(--amber-bg);color:var(--amber)}
.rag-badge.red{background:var(--red-bg);color:var(--red)}
/* ── DEPENDENCY ── */
.dep-badge{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--amber-bg);color:var(--amber);display:inline-flex;align-items:center;gap:4px;margin-top:4px}
/* ── RECURRING ── */
.recur-badge{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--accent-bg);color:var(--accent2);display:inline-flex;align-items:center;gap:3px}

/* ── REPORTS ── */
.report-wrap{flex:1;overflow-y:auto;padding:22px}
.report-filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.report-filters select,.report-filters input[type=date]{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:var(--font);font-size:13px;padding:7px 11px;outline:none;cursor:pointer}
.report-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.report-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 18px}
.report-stat-num{font-family:var(--font-display);font-size:28px;font-weight:800;line-height:1}
.report-stat-label{font-size:12px;color:var(--text3);margin-top:4px}
.report-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:20px}
.report-table-head{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr 1.5fr;gap:0;padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3)}
.report-table-row{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr 1.5fr;gap:0;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;transition:background 0.12s;cursor:pointer}
.report-table-row:last-child{border-bottom:none}
.report-table-row:hover{background:var(--surface2)}
.report-bar-row{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.report-bar-item{display:flex;align-items:center;gap:12px}
.report-bar-label{font-size:12px;font-weight:600;min-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.report-bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.report-bar-fill{height:100%;border-radius:4px;transition:width 0.4s}
.report-bar-val{font-size:12px;font-weight:700;min-width:40px;text-align:right}
/* ── ATTACHMENTS ── */
.attachment-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.attachment-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.attachment-icon{font-size:16px;flex-shrink:0;color:var(--accent2)}
.attachment-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attachment-size{font-size:11px;color:var(--text3);flex-shrink:0}
.attachment-dl{width:24px;height:24px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s;flex-shrink:0}
.attachment-dl:hover{background:var(--bg4);color:var(--text)}
.attachment-rm{width:24px;height:24px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s;flex-shrink:0}
.attachment-rm:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.attach-drop{border:2px dashed var(--border2);border-radius:10px;padding:16px;text-align:center;cursor:pointer;color:var(--text3);font-size:12px;transition:all 0.15s;margin-top:4px}
.attach-drop:hover,.attach-drop.drag-over{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
/* ── TIME LOG in modal ── */
.timelog-list{display:flex;flex-direction:column;gap:4px;margin-top:6px;max-height:160px;overflow-y:auto}
.timelog-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 8px;background:var(--bg3);border-radius:7px}
.timelog-date{color:var(--text3);flex-shrink:0;min-width:75px}
.timelog-dur{font-weight:700;color:var(--accent);flex-shrink:0;min-width:45px}
.timelog-note{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.timelog-rm{opacity:0;transition:opacity 0.15s;background:none;border:none;color:var(--text3);cursor:pointer;padding:0 2px}
.timelog-row:hover .timelog-rm{opacity:1}

/* ── ACTIVE TIMER INDICATOR ── */
#timer-indicator{display:none;align-items:center;gap:6px;padding:4px 10px;background:var(--red-bg);border:1px solid var(--red);border-radius:20px;font-size:12px;font-weight:600;color:var(--red);cursor:pointer;transition:all 0.2s}
#timer-indicator.active{display:flex}
#timer-indicator .pulse{width:7px;height:7px;border-radius:50%;background:var(--red);animation:timerPulse 1s infinite}
@keyframes timerPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}

/* ── COMMAND PALETTE ── */
#cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:2000;display:none;align-items:flex-start;justify-content:center;padding-top:60px;backdrop-filter:blur(6px)}
#cmd-overlay.open{display:flex}
#cmd-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:600px;max-width:92vw;overflow:hidden;box-shadow:0 32px 100px rgba(0,0,0,0.7)}
#cmd-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);outline:none;padding:16px 18px;font-size:16px;color:var(--text);font-family:var(--font)}
#cmd-input::placeholder{color:var(--text3)}
#cmd-results{max-height:420px;overflow-y:auto}
.cmd-section{padding:8px 14px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3)}
.cmd-item{display:flex;align-items:center;gap:12px;padding:9px 16px;cursor:pointer;transition:background 0.1s;border-radius:0}
.cmd-item:hover,.cmd-item.active{background:var(--bg3)}
.cmd-item.active{background:var(--accent-bg)}
.cmd-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--bg3)}
.cmd-item.active .cmd-icon{background:var(--accent-bg)}
.cmd-label{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmd-sub{font-size:11px;color:var(--text3);flex-shrink:0}
.cmd-kbd{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;font-family:monospace;flex-shrink:0}
#cmd-footer{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:14px;font-size:11px;color:var(--text3)}

let USERS=[];
let S;
(function initState(){
  const fresh=()=>JSON.parse(JSON.stringify(SEED));
  try{
    const raw=localStorage.getItem('pf2');
    if(!raw){S=fresh();return;}
    const p=JSON.parse(raw);
    // migrate missing fields
    if(!p.users)p.users=fresh().users;
    if(!p.notifications)p.notifications={dueSoon:true,overdue:true};
    // Always ensure notification keys exist and default to true
    if(p.notifications.dueSoon===undefined)p.notifications.dueSoon=true;
    if(p.notifications.overdue===undefined)p.notifications.overdue=true;
    if(!p.notes)p.notes=fresh().notes;
    if(!p.quickLinks)p.quickLinks=fresh().quickLinks;
    if(!p.workspaceName)p.workspaceName='ProjectFlow';
    if(!p.userName)p.userName=p.users[0]?.name||'Alex Johnson';
    if(!p.userRole)p.userRole='Admin';
    if(!p.settings)p.settings={autoProgress:true};
    if(!p.dashKPIs)p.dashKPIs=JSON.parse(JSON.stringify(fresh().dashKPIs));
    // migrate projectNotes -> projects
    p.projects.forEach(proj=>{
      if(proj.projectNotes===undefined)proj.projectNotes='';
      (proj.tasks||[]).forEach(t=>{
        if(!t.timeLogs)t.timeLogs=[];
        if(!t.attachments)t.attachments=[];
        // If task has tracked time but no logs, create a synthetic log
        if(t.tracked&&t.tracked>0&&t.timeLogs.length===0){
          t.timeLogs=[{id:'tl'+Math.random().toString(36).slice(2,7),userId:t.assignees&&t.assignees[0]?t.assignees[0]:'u1',start:t.updated||Date.now(),end:(t.updated||Date.now()),duration:t.tracked,date:(t.updated?new Date(t.updated):new Date()).toISOString().slice(0,10),note:'Imported from legacy tracked time'}];
        }
      });
    });
    S=p;
  }catch(e){
    localStorage.removeItem('pf2');
    S=fresh();
  }
  USERS=S.users;
})();

  renderDash(el){
    const all=S.projects.flatMap(p=>p.tasks.map(t=>({...t,_p:p})));
    const td=today();
    const overdue=all.filter(t=>t.due&&t.due<td&&t.progress<100);
    const dueToday=all.filter(t=>t.due===td&&t.progress<100);
    const done=all.filter(t=>t.progress===100);
    const inProg=all.filter(t=>t.progress>0&&t.progress<100);
    const notStarted=all.filter(t=>t.progress===0&&t.progress!==100);

    // Upcoming -- next 7 days (excluding today)
    const in7=new Date();in7.setDate(in7.getDate()+7);
    const in7s=in7.toISOString().slice(0,10);
    const upcoming=all.filter(t=>t.due&&t.due>td&&t.due<=in7s&&t.progress<100).sort((a,b)=>a.due.localeCompare(b.due));

    // Workload per person -- open tasks assigned
    const workload=S.users.map(u=>({
      u,count:all.filter(t=>t.progress<100&&(t.assignees||[]).includes(u.id)).length
    })).filter(x=>x.count>0).sort((a,b)=>b.count-a.count);

    // Priority breakdown -- open tasks only
    const open=all.filter(t=>t.progress<100);
    const prios=[
      {k:'critical',label:'Critical',col:'var(--red)'},
      {k:'high',label:'High',col:'var(--amber)'},
      {k:'medium',label:'Medium',col:'var(--blue)'},
      {k:'low',label:'Low',col:'var(--green)'},
    ].map(p=>({...p,n:open.filter(t=>t.priority===p.k).length})).filter(p=>p.n>0);
    const maxPrio=Math.max(1,...prios.map(p=>p.n));

    // Velocity -- use completedAt if available, fall back to updated for progress=100 tasks
    const now=Date.now(),wk=7*864e5;
    const doneThisWk=done.filter(t=>(t.completedAt||t.updated)&&now-(t.completedAt||t.updated)<wk).length;
    const doneLastWk=done.filter(t=>(t.completedAt||t.updated)&&now-(t.completedAt||t.updated)>=wk&&now-(t.completedAt||t.updated)<2*wk).length;
    const velDiff=doneThisWk-doneLastWk;
    const velPct=doneLastWk>0?Math.round(Math.abs(velDiff)/doneLastWk*100):0;

    el.style.overflow='hidden';el.style.display='flex';el.style.flexDirection='column';
    el.innerHTML=`<div class="dash-wrap">
      <div style="margin-bottom:22px">
        <div style="font-family:var(--font-display);font-weight:800;font-size:24px">${(()=>{const h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening'})()}, ${S.userName||'there'} 👋</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">Here's what needs your attention today.</div>
      </div>

        ${(S.dashKPIs||[]).map(kpi=>{
          // Compute value and sub-label for this KPI type
          let val=0,sub='',onclick='';
          if(kpi.type==='total'){val=all.length;sub=S.projects.length+' project'+(S.projects.length!==1?'s':'');onclick="App.nav('projects')";}
          else if(kpi.type==='done'){val=done.length;sub=(all.length?Math.round(done.length/all.length*100):0)+'% completion rate';}
          else if(kpi.type==='inprog'){val=inProg.length;sub=notStarted.length+' not started';}
          else if(kpi.type==='overdue'){val=overdue.length;sub=dueToday.length+' due today';}
          else if(kpi.type==='onhold'){
            const onHoldTasks=all.filter(t=>{const p2=S.projects.find(pp=>pp.tasks.some(x=>x.id===t.id));const col=p2?.columns.find(c=>c.id===t.colId);return col&&col.title.toLowerCase().includes('hold')&&t.progress<100;});
            val=onHoldTasks.length;sub='paused tasks';
          }
          else if(kpi.type==='notstarted'){val=notStarted.length;sub='not yet begun';}
          else if(kpi.type==='col'&&kpi.colTitle){
            const colTasks=all.filter(t=>{const p2=S.projects.find(pp=>pp.tasks.some(x=>x.id===t.id));const col=p2?.columns.find(c=>c.id===t.colId);return col&&col.title===kpi.colTitle;});
            val=colTasks.length;sub='in '+kpi.colTitle;
          }
          const col=kpi.color||'var(--accent)';
          return`<div class="stat-card" ${onclick?'onclick="'+onclick+'" style="cursor:pointer"':''}>
            <div class="stat-accent" style="background:${col}"></div>
            <div class="stat-num" style="${(kpi.type==='overdue'&&val>0)?'color:'+col:''}">${val}</div>
            <div class="stat-label">${kpi.label}</div>
            <div class="stat-sub" style="color:${col}">${sub}</div>
          </div>`;
        }).join('')}
        <div class="stat-card" onclick="App.editDashKPIs()" style="cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;border-style:dashed;opacity:0.6" title="Customise KPIs">
          <i class="ti ti-layout-grid-add" style="font-size:22px;color:var(--text3)"></i>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">Edit</div>
        </div>
      </div>

      <!-- Row 2: Projects + Upcoming -->
      <div class="dash-2col">
        <div class="d-card">
          <div class="d-card-header"><div class="d-card-title">Projects</div><button class="btn btn-ghost" style="font-size:12px" onclick="App.nav('projects')">View all -></button></div>
          ${S.projects.map(p=>{
            const tasks=p.tasks||[],dn=tasks.filter(t=>t.progress===100).length,pct=tasks.length?Math.round(dn/tasks.length*100):0;
            const rag=App.calcRAG(p);
            return`<div class="d-row" onclick="App.nav('kanban','${p.id}')">
              <div style="width:34px;height:34px;border-radius:9px;background:${p.color}22;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">${p.emoji}</div>
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-size:13px;font-weight:600">${p.name}</span><span class="rag-badge ${rag.status}" title="${rag.reason}"><span class="rag-dot rag-${rag.status}"></span>${rag.label}</span></div>
                <div class="mini-bar" style="width:100px"><div class="mini-bar-fill" style="width:${pct}%;background:${p.color}"></div></div>
              </div>
              <div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:700">${pct}%</div><div style="font-size:11px;color:var(--text3)">${dn}/${tasks.length}</div></div>
            </div>`;
          }).join('')}
        </div>
        <div class="d-card">
          <div class="d-card-header"><div class="d-card-title"><i class="ti ti-calendar-due" style="margin-right:6px;color:var(--accent2)"></i>Upcoming -- Next 7 Days</div></div>
          ${!upcoming.length?`<div style="font-size:12px;color:var(--text3);padding:12px 0;text-align:center">Nothing due in the next 7 days 🎉</div>`:''}
          ${upcoming.slice(0,7).map(t=>{
            const daysLeft=Math.round((new Date(t.due)-new Date(td))/864e5);
            const po=priObj(t.priority);
            return`<div class="d-row" onclick="App.openTask('${t.id}')">
              <div style="width:34px;height:34px;border-radius:9px;background:${daysLeft<=2?'var(--amber-bg)':'var(--bg3)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;flex-direction:column">
                <span style="font-size:14px;font-weight:800;color:${daysLeft<=2?'var(--amber)':'var(--text2)'};line-height:1">${daysLeft}</span>
                <span style="font-size:9px;color:var(--text3)">day${daysLeft!==1?'s':''}</span>
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</div>
                <div style="font-size:11px;color:var(--text3)">${t._p.emoji} ${t._p.name}</div>
              </div>
              <span class="badge" style="background:${po.bg};color:${po.col};flex-shrink:0">${t.priority}</span>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Row 3: Workload + Priority breakdown + Velocity + Time -->
      <div class="dash-3col" style="grid-template-columns:1fr 1fr 1fr 1fr">
        <div class="d-card" style="margin-bottom:0">
          <div class="d-card-header"><div class="d-card-title"><i class="ti ti-users" style="margin-right:6px;color:var(--accent2)"></i>Workload</div></div>

          ${!workload.length?`<div style="font-size:12px;color:var(--text3);padding:10px 0;text-align:center">No assigned tasks</div>`:''}
          ${workload.slice(0,5).map(({u,count})=>{
            const pct=Math.round(count/Math.max(1,...workload.map(x=>x.count))*100);

              </div>
              <div style="height:4px;background:var(--bg3);border-radius:2px"><div style="height:4px;background:${u.color};border-radius:2px;width:${pct}%;transition:width 0.3s"></div></div>
            </div>`;
          }).join('')}
          </div>
        </div>
        <div class="d-card" style="margin-bottom:0">
          <div class="d-card-header"><div class="d-card-title"><i class="ti ti-flag" style="margin-right:6px;color:var(--accent2)"></i>Priority Split</div></div>
          <div style="padding:12px 14px">
          ${!open.length?`<div style="font-size:12px;color:var(--text3);padding:10px 0;text-align:center">No open tasks</div>`:''}
          ${prios.map(p=>`<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
              <span style="font-weight:600;color:${p.col}">${p.label}</span>
              <span style="font-weight:700;color:var(--text)">${p.n}</span>
            </div>
            <div style="height:4px;background:var(--bg3);border-radius:2px"><div style="height:4px;background:${p.col};border-radius:2px;width:${Math.round(p.n/maxPrio*100)}%;transition:width 0.3s"></div></div>
          </div>`).join('')}
          </div>
        </div>
        <div class="d-card" style="margin-bottom:0">
          <div class="d-card-header"><div class="d-card-title"><i class="ti ti-trending-up" style="margin-right:6px;color:var(--accent2)"></i>Velocity</div></div>
          <div style="text-align:center;padding:14px 14px 16px">
            <div style="font-size:36px;font-weight:800;font-family:var(--font-display);color:var(--text)">${doneThisWk}</div>
            <div style="font-size:12px;color:var(--text3)">tasks completed this week</div>
            <div style="margin-top:10px;font-size:12px;font-weight:600;color:${velDiff>0?'var(--green)':velDiff<0?'var(--red)':'var(--text3)'}">
              ${velDiff===0&&doneLastWk===0?'No data yet':velDiff>0?`^ ${velPct}% vs last week`:velDiff<0?`v ${velPct}% vs last week`:'Same as last week'}
            </div>
            <div style="margin-top:12px;display:flex;gap:8px;justify-content:center">
              <div style="text-align:center;padding:8px 12px;background:var(--bg3);border-radius:9px;min-width:60px">
                <div style="font-size:18px;font-weight:700">${doneLastWk}</div>
                <div style="font-size:10px;color:var(--text3)">last week</div>
              </div>
              <div style="text-align:center;padding:8px 12px;background:var(--accent-bg);border-radius:9px;min-width:60px">
                <div style="font-size:18px;font-weight:700;color:var(--accent)">${doneThisWk}</div>
                <div style="font-size:10px;color:var(--text3)">this week</div>
              </div>
            </div>
          </div>
        </div>
        <div class="d-card" style="margin-bottom:0">
          <div class="d-card-header"><div class="d-card-title"><i class="ti ti-clock" style="margin-right:6px;color:var(--accent2)"></i>Time Tracked</div></div>
          <div style="padding:12px 14px">
            ${(()=>{
              const now=Date.now(),wk=7*864e5;
              const allTasks=S.projects.flatMap(p=>p.tasks);
              const totalHrs=allTasks.reduce((s,t)=>s+(t.tracked||0),0);
              const wkHrs=allTasks.filter(t=>t.tracked&&t.lastTracked&&now-t.lastTracked<wk).reduce((s,t)=>s+(t.tracked||0),0);
              const projHrs=S.projects.filter(p=>p.tasks.some(t=>t.tracked>0)).map(p=>({p,hrs:p.tasks.reduce((s,t)=>s+(t.tracked||0),0)}));
              const maxH=Math.max(1,...projHrs.map(x=>x.hrs));
              return '<div style="text-align:center;margin-bottom:12px"><div style="font-size:28px;font-weight:800;font-family:var(--font-display)">'+(Math.round(wkHrs*10)/10)+'h</div><div style="font-size:11px;color:var(--text3)">this week &nbsp;|&nbsp; '+(Math.round(totalHrs*10)/10)+'h all time</div></div>'
                +(projHrs.length?projHrs.map(({p,hrs})=>'<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>'+p.emoji+' '+p.name+'</span><span style="font-weight:700">'+(Math.round(hrs*10)/10)+'h</span></div><div style="height:4px;background:var(--bg3);border-radius:2px"><div style="height:4px;background:'+p.color+';border-radius:2px;width:'+Math.round(hrs/maxH*100)+'%"></div></div></div>').join('')
                :'<div style="font-size:12px;color:var(--text3);text-align:center;padding:10px 0">No time logged yet.<br>Use the timer inside any task.</div>');
            })()}
          </div>
        </div>
      </div>
      ${overdue.length?`<div class="d-card" style="margin-bottom:14px;border-color:var(--red)">
        <div class="d-card-header" style="background:var(--red-bg)">
          <div class="d-card-title" style="color:var(--red)"><i class="ti ti-alert-triangle" style="margin-right:6px"></i>Overdue -- ${overdue.length} task${overdue.length!==1?'s':''} need attention</div>
        </div>
        ${overdue.slice(0,6).map(t=>{const po=priObj(t.priority);return`<div class="d-row" onclick="App.openTask('${t.id}')">
          <div class="d-row-dot" style="background:var(--red)"></div>
          <div class="d-row-title">${t.title}</div>
          <div style="font-size:11px;color:var(--text3);flex-shrink:0">${t._p.emoji} ${t._p.name}</div>
          <div style="font-size:11px;color:var(--red);flex-shrink:0;font-weight:600">${t.due}</div>
        </div>`}).join('')}
        ${overdue.length>6?`<div style="padding:8px 18px;font-size:11px;color:var(--text3)">+${overdue.length-6} more overdue tasks</div>`:''}
      </div>`:''}

      <!-- Due today -->
      ${dueToday.length?`<div class="d-card" style="margin-bottom:14px">
        <div class="d-card-header"><div class="d-card-title"><i class="ti ti-clock" style="margin-right:6px;color:var(--amber)"></i>Due Today -- ${dueToday.length} task${dueToday.length!==1?'s':''}</div></div>
        ${dueToday.map(t=>{const po=priObj(t.priority);return`<div class="d-row" onclick="App.openTask('${t.id}')">
          <div class="d-row-dot" style="background:${po.col}"></div>
          <div class="d-row-title">${t.title}</div>
          <div style="font-size:11px;color:var(--text3);flex-shrink:0">${t._p.emoji} ${t._p.name}</div>
          <span class="badge" style="background:${po.bg};color:${po.col};flex-shrink:0">${t.priority}</span>
        </div>`}).join('')}
      </div>`:''}

    </div>`;
  },
  renderProjects(el){
    el.style.overflow='hidden';el.style.display='flex';el.style.flexDirection='column';
    el.innerHTML=`<div style="flex:1;overflow-y:auto"><div class="proj-grid">
      ${S.projects.map(p=>{
        const tasks=p.tasks||[],dn=tasks.filter(t=>t.progress===100).length,pct=tasks.length?Math.round(dn/tasks.length*100):0,ov=tasks.filter(t=>t.due&&t.due<today()&&t.progress<100).length,ms=(p.members||[]).map(id=>S.users.find(u=>u.id===id)).filter(Boolean);
        return`<div class="proj-card">
          <div style="display:flex;align-items:flex-start;margin-bottom:6px">
            <div class="proj-emoji" style="margin-bottom:0;margin-right:8px;flex-shrink:0;cursor:pointer" onclick="App.nav('kanban','${p.id}')">${p.emoji}</div>
            <div style="flex:1;min-width:0;cursor:pointer" onclick="App.nav('kanban','${p.id}')">

              <div class="proj-desc">${p.desc}</div>
            </div>
            <div class="proj-card-actions">
              <button class="proj-act-btn" onclick="event.stopPropagation();App.editProject('${p.id}')" title="Edit"><i class="ti ti-pencil"></i></button>
              <button class="proj-act-btn danger" onclick="event.stopPropagation();App.deleteProject('${p.id}')" title="Delete"><i class="ti ti-trash"></i></button>
            </div>
          </div>
          ${p.projectNotes?`<div class="proj-notes">${p.projectNotes}</div>`:''}
          <div class="proj-stats">
            <div class="proj-stat"><strong>${tasks.length}</strong><span>Tasks</span></div>
            <div class="proj-stat"><strong>${dn}</strong><span>Done</span></div>
            <div class="proj-stat" style="${ov?'color:var(--red)':''}"><strong>${ov}</strong><span>Overdue</span></div>
            <div class="proj-stat"><strong>${ms.length}</strong><span>Members</span></div>
          </div>
          <div style="margin-bottom:12px"><div class="proj-prog-label"><span>Progress</span><span>${pct}%</span></div><div class="proj-prog-bar"><div class="proj-prog-fill" style="width:${pct}%;background:${p.color}"></div></div></div>
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div class="team-stack">${ms.slice(0,4).map(u=>`<div class="avatar av-sm" style="background:${u.color}22;color:${u.color};border-color:var(--surface)">${u.initials}</div>`).join('')}${ms.length>4?`<div class="avatar av-sm" style="background:var(--bg4);color:var(--text3)">+${ms.length-4}</div>`:''}</div>
            <span style="font-size:11px;color:var(--text3)">Due ${p.deadline}</span>
          </div>
        </div>`;
      }).join('')}
      <div class="proj-card new-card" onclick="App.newProject()"><i class="ti ti-plus" style="font-size:28px;color:var(--text3)"></i><span style="font-size:13px;font-weight:600;color:var(--text3)">New Project</span></div>
    </div></div>`;
  },

  /* ─── KANBAN ─── */
  renderKanban(el){
    const p=proj();
    if(!p){el.innerHTML='<div class="empty"><i class="ti ti-folders"></i><h3>No project selected</h3></div>';return}
    el.style.overflow='hidden';el.style.display='flex';el.style.flexDirection='column';
    let html=`<div class="filter-bar">
      <div class="search-wrap"><i class="ti ti-search"></i><input class="search-input" id="kanban-search" type="text" placeholder="Search tasks, tags..." value="${searchQ}"/></div>
      <select id="prio-filter-sel" onchange="App.setPrio(this.value)" style="background:var(--bg3);border:1px solid ${filterPrio?'var(--accent)':'var(--border2)'};border-radius:20px;color:${filterPrio?'var(--accent)':'var(--text2)'};font-family:var(--font);font-size:12px;font-weight:600;padding:4px 10px;outline:none;cursor:pointer;height:30px">
        <option value="">Priority</option>
        ${['critical','high','medium','low'].map(v=>`<option value="${v}"${filterPrio===v?' selected':''}>${v.charAt(0).toUpperCase()+v.slice(1)}</option>`).join('')}
      </select>
      <select id="label-filter-sel" onchange="App.setLabel(this.value)" style="background:var(--bg3);border:1px solid ${filterLabel?'var(--accent)':'var(--border2)'};border-radius:20px;color:${filterLabel?'var(--accent)':'var(--text2)'};font-family:var(--font);font-size:12px;font-weight:600;padding:4px 10px;outline:none;cursor:pointer;height:30px">
        <option value="">Label</option>
        ${[...new Set((proj()?.tasks||[]).flatMap(t=>t.labels||[]))].sort().map(l=>`<option value="${l}"${filterLabel===l?' selected':''}>${l}</option>`).join('')}
      </select>
      <select id="tag-filter-sel" onchange="App.setTag(this.value)" style="background:var(--bg3);border:1px solid ${filterTag?'var(--accent)':'var(--border2)'};border-radius:20px;color:${filterTag?'var(--accent)':'var(--text2)'};font-family:var(--font);font-size:12px;font-weight:600;padding:4px 10px;outline:none;cursor:pointer;height:30px">
        <option value="">Tag</option>
        ${[...new Set((proj()?.tasks||[]).flatMap(t=>t.tags||[]))].sort().map(tg=>`<option value="${tg}"${filterTag===tg?' selected':''}>${tg}</option>`).join('')}
      </select>
      <button class="filter-chip" onclick="App.clearFilters()" title="Clear all filters"><i class="ti ti-x"></i> Clear</button>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="btn" onclick="App.addColumn()"><i class="ti ti-plus"></i>Column</button>
      </div>
    </div>`;
    if(S.kanbanView==='list'){html+=this.buildList(p);}
    else{
      html+=`<div id="kanban-wrap">`;
      p.columns.forEach(col=>{html+=this.buildCol(col,this.filteredTasks(p,col.id),p)});
      html+=`<div class="add-col-btn" onclick="App.addColumn()"><i class="ti ti-plus"></i><span>Add Column</span></div></div>`;
    }
    const _kp=proj();if(_kp){const _tb=document.getElementById('topbar');if(_tb)_tb.style.borderBottom='1px solid '+_kp.color+'44';}
    el.innerHTML=html;
    this.bindDD();
    // Restore cursor position if search was active (input value is set via html value attr)
    if(searchQ){const si=document.getElementById('kanban-search');if(si){si.focus();try{si.setSelectionRange(si.value.length,si.value.length);}catch(e){}}}
  },
  filteredTasks(p,colId){
    let t=p.tasks.filter(x=>x.colId===colId);
    if(searchQ)t=t.filter(x=>x.title.toLowerCase().includes(searchQ.toLowerCase())||(x.desc||'').toLowerCase().includes(searchQ.toLowerCase())||(x.tags||[]).some(tg=>tg.toLowerCase().includes(searchQ.toLowerCase())));
    if(filterPrio)t=t.filter(x=>x.priority===filterPrio);
    if(filterLabel)t=t.filter(x=>(x.labels||[]).some(l=>l.toLowerCase().includes(filterLabel.toLowerCase())));
    if(filterTag)t=t.filter(x=>(x.tags||[]).some(tg=>tg===filterTag));
    return t;
  },
  setSearch(v){
    searchQ=v;
    const p=proj();if(!p)return;
    // Only re-render if tag filter also needs full re-render
    p.columns.forEach(col=>{
      const cb=document.getElementById('cb-'+col.id);
      if(cb){const tasks=this.filteredTasks(p,col.id);cb.innerHTML=(tasks.length===0?`<div class="empty" style="padding:24px 8px"><i class="ti ti-inbox" style="font-size:22px"></i><p style="font-size:11px">Drop tasks here</p></div>`:'')+tasks.map(t=>this.buildCard(t)).join('');}
    });
    // Keep search input focused in Chrome
    const si=document.getElementById('kanban-search');
    if(si&&document.activeElement!==si){}  // don't steal focus
  },
  cycleTag(){const p=proj(),tags=['',...new Set(p.tasks.flatMap(t=>t.tags||[]))];filterTag=tags[(tags.indexOf(filterTag)+1)%tags.length];this.renderKanban(document.getElementById('content'))},

  /* ─── DRAG & DROP ─── */
  bindDD(){},
  onColDragStart(e,colId){
    // Don't start col drag if it's a task card drag starting
    if(dragTaskId)return;
    dragColId=colId;
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/col',colId);
    // Slight delay so the dragging style applies after drag image is captured
    setTimeout(()=>{const el=document.querySelector(`.k-col[data-col="${colId}"]`);if(el)el.classList.add('col-dragging');},0);
    e.stopPropagation();
  },
  onColDragEnd(e){
    dragColId=null;
    document.querySelectorAll('.k-col').forEach(c=>{
      c.classList.remove('col-dragging','col-drop-left','col-drop-right');
    });
  },
  onColLeave(e){
    // Remove drop indicator when leaving a column
    const col=e.currentTarget;
    if(col)col.classList.remove('col-drop-left','col-drop-right');
  },
  onDragStart(e,id){dragColId=null;dragTaskId=id;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.stopPropagation();},
  onDragEnd(e){e.target.classList.remove('dragging');document.querySelectorAll('.k-col').forEach(c=>c.classList.remove('drag-target'));dragTaskId=null},
  onCardOver(e){e.preventDefault();e.stopPropagation()},
  onCardDrop(e,targetId){
    e.preventDefault();e.stopPropagation();
    if(!dragTaskId||dragTaskId===targetId)return;
    const p=proj(),src=p.tasks.find(t=>t.id===dragTaskId),tgt=p.tasks.find(t=>t.id===targetId);
    if(!src||!tgt)return;
    src.colId=tgt.colId;src.updated=Date.now();
    const si=p.tasks.indexOf(src),ti=p.tasks.indexOf(tgt);
    p.tasks.splice(si,1);p.tasks.splice(ti,0,src);
    dragTaskId=null;this.renderKanban(document.getElementById('content'));this.toast('Task moved','ok');
  },
  onColOver(e,colId){
    e.preventDefault();
    if(dragColId&&dragColId!==colId){
      // Column reorder mode — show left/right drop indicator
      e.dataTransfer.dropEffect='move';
      const targetEl=document.querySelector(`.k-col[data-col="${colId}"]`);
      if(targetEl){
        const rect=targetEl.getBoundingClientRect();
        const isLeft=e.clientX<rect.left+rect.width/2;
        document.querySelectorAll('.k-col').forEach(c=>c.classList.remove('col-drop-left','col-drop-right'));
        targetEl.classList.add(isLeft?'col-drop-left':'col-drop-right');
      }
    } else if(!dragColId){
      // Task drag mode — highlight column as drop target
      document.querySelectorAll('.k-col').forEach(c=>c.classList.toggle('drag-target',c.dataset.col===colId));
    }
  },
  onColDrop(e,colId){
    e.preventDefault();
    document.querySelectorAll('.k-col').forEach(c=>c.classList.remove('drag-target','col-drop-left','col-drop-right'));
    // Column reorder mode
    if(dragColId&&dragColId!==colId){
      const p=proj();if(!p)return;
      const fromIdx=p.columns.findIndex(c=>c.id===dragColId);
      const toIdx=p.columns.findIndex(c=>c.id===colId);
      if(fromIdx<0||toIdx<0){dragColId=null;return;}
      const targetEl=document.querySelector(`.k-col[data-col="${colId}"]`);
      const rect=targetEl?targetEl.getBoundingClientRect():null;
      const insertAfter=rect?e.clientX>rect.left+rect.width/2:fromIdx<toIdx;
      const col=p.columns.splice(fromIdx,1)[0];
      const newTo=p.columns.findIndex(c=>c.id===colId);
      p.columns.splice(insertAfter?newTo+1:newTo,0,col);
      dragColId=null;save();this.renderKanban(document.getElementById('content'));return;
    }
    // Task drop mode
    if(!dragTaskId)return;
    const p=proj(),t=p.tasks.find(x=>x.id===dragTaskId);
    if(!t||t.colId===colId)return;
    t.colId=colId;t.updated=Date.now();dragTaskId=null;
    this.renderKanban(document.getElementById('content'));this.toast('Task moved','ok');
  },

      ()=>{const n=document.getElementById('ec-name').value.trim(),c2=document.getElementById('ec-col').value;if(n)col.title=n;if(c2)col.color=c2;this.renderKanban(document.getElementById('content'));this.toast('Column updated','ok')},'Save');
  },
  delCol(id){

      if(cnt>0){const first=p.columns.find(c=>c.id!==id);p.tasks.filter(t=>t.colId===id).forEach(t=>t.colId=first.id)}
      p.columns=p.columns.filter(c=>c.id!==id);this.renderKanban(document.getElementById('content'));this.toast('Column deleted');

          </div>

              <i class="ti ${App.fileIcon(a.type)} attachment-icon"></i>
              <span class="attachment-name" title="${a.name}">${a.name}</span>
              <span class="attachment-size">${App.fmtSize(a.size)}</span>

            ondrop="App.attachDrop(event,'${t.id}')">

        <div class="m-section">

            <div class="m-label">Subtasks (${dsub}/${tsub})</div>
            <button class="btn btn-ghost" style="padding:3px 8px;font-size:11px" onclick="App.addSub('${t.id}')"><i class="ti ti-plus"></i>Add</button>

            ${(t.subtasks||[]).map((s,i)=>`<div class="check-item">
              <div class="checkbox ${s.done?'checked':''}" onclick="App.toggleSub('${t.id}',${i})"></div>

          <div class="m-label">Comments (${(t.comments||[]).length})</div>
